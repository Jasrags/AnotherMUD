id: ostler
name: Aldin the ostler
type: npc
behavior: stationary
tags: [humanoid, stable]
keywords: [ostler, aldin, stablemaster, groom]
description: |
  A stocky man in a leather jerkin, straw clinging to his sleeves and the smell
  of horse and harness-oil about him. He keeps the paddock at the edge of the
  village — boards the district's few horses and will sell a steady saddle mare
  to anyone with the coin and a road to travel. He glances at your boots, judging
  how far you mean to go.
# Friendly to everyone — a tradesman, not a threat.
disposition_rules:
  default: friendly
stats:
  hp_max: 20
  str: 12
# Stable block (mounts.md §3.1, §3.2). The `stable` tag marks this mob as a
# stable access point — `stable`/`unstable` work in its room. The `sells` map
# (mount-template-id -> price) is the mount roster on offer; `buymount` resolves
# a query against it. Ids are namespace-qualified: like the shop block, this is
# an arbitrary property map the loader does NOT rewrite, so the mount service
# looks them up verbatim in the (namespaced) mob registry.
properties:
  stable:
    sells:
      wot:riding-horse: 200
