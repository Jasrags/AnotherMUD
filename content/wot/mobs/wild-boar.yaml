id: wild-boar
name: a wild boar
type: npc
behavior: stationary
description: |
  A heavy-shouldered boar roots through the leaf-litter, tusks yellowed and its
  small eyes wary. It minds its own business — until something gives it a reason
  not to.
tags: [animal, beast]
keywords: [boar, pig, hog]
# Neutral, not hostile: the boar does not aggro, so the Westwood stays safe to
# gather in. A character who wants meat hunts it deliberately (`kill boar`) — the
# loot source of raw meat (crafting §8: meat from the hunt). It fights back once
# engaged.
disposition_rules:
  default: neutral
stats:
  hp_max: 18
  str: 12
# Unarmed (tusks). Drops meat on death (M22). No coin block — a wild animal
# carries no purse.
loot_table: boar-loot
