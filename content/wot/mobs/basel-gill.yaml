id: basel-gill
name: Basel Gill
type: npc
behavior: stationary
description: |
  The innkeeper of the Queen's Blessing is a stout, balding, comfortable man with
  a neat grey-shot fringe of hair, a fine waistcoat straining a little at its
  buttons, and the easy good humour of a host who has kept the best inn in the New
  City for thirty years and is quietly proud of it. He has a shrewd eye, a long
  memory for a face, and a particular fondness for gleemen and travellers with a
  tale to tell — for whom, it is said, there is always a bed at the Blessing, coin
  or no coin.
tags: [humanoid, shop]
keywords: [basel, gill, innkeeper, host]
stats:
  hp_max: 28
  str: 11
disposition_rules:
  default: friendly
properties:
  shop:
    # faction.md §6 favored-customer pricing (economy-survival §3.3.1): the
    # Queen's Blessing keeps a soft spot for the Queen's own — a guest who has
    # earned the Queen's Guard's regard (Honored+, standing >= 500) dines at a
    # friend's price. No access gate: Basel turns no paying guest away. The
    # faction id is written fully-qualified (the shop block is not ns-resolved).
    faction: wot:queens-guard
    ally_standing: 500
    ally_discount: 0.15
    sells:
      - wot:cooked-meal
      - wot:trail-rations
      - wot:fine-wine
