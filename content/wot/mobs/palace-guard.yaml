id: palace-guard
name: a Palace Guardsman
xp_value: 60  # kill experience (grouping.md §4)
type: npc
behavior: stationary
description: |
  One of the Queen's own, hand-picked for the Palace gate and turned out
  flawless — mirror-bright plate-and-mail, a spotless red cloak, a halberd held
  with parade precision — he stands the watch with the still, expressionless
  discipline of a soldier who guards the person of the Queen herself. His eyes
  move and nothing else does, and the message of his stance needs no words: the
  Palace is the Queen's, you are not expected, and you will not be passing today.
tags: [humanoid]
keywords: [guard, guardsman, palace, soldier]
stats:
  hp_max: 46
  str: 16
# faction.md §6: the Queen's Guard come down hard on a known lawbreaker — any
# character whose Queen's-Guard standing has fallen below Neutral. An untouched
# character reads at the starting Neutral standing and is met at the default.
disposition_rules:
  default: neutral
  rules:
    - faction: queens-guard
      max_standing: -1
      reaction: hostile
    # reputation.md §6/§7: the Queen's Guard keep a wary eye on a known
    # troublemaker — anyone the Infamy feat marks as infamous (rule order
    # matters: an outright lawbreaker is met with hostility above first).
    - infamous: true
      reaction: wary

# faction membership (faction.md §5.2): killing this mob shifts the
# killer's standing with the faction by the on-kill delta.
faction: queens-guard
