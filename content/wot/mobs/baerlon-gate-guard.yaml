id: baerlon-gate-guard
name: a Baerlon gate guard
type: npc
behavior: stationary
description: |
  A solid, sour-faced man in a dented breastplate and the red of Andor faded
  almost to brown, he holds down the Watch Gate with a halberd grounded at his
  boot and a chewed straw working from one corner of his mouth. He has stood
  this gate through good years and bad and trusts no one who comes up the river
  road, least of all in times like these. His eyes track you the whole way past,
  weighing whether you are trouble, and plainly expecting that you are.
tags: [humanoid]
keywords: [guard, gate, gateguard, watchman]
stats:
  hp_max: 38
  str: 14
# faction.md §6 / §3.3: the Queen's Guard come down hard on a known lawbreaker —
# a character whose Queen's-Guard standing has fallen to Unfriendly or Hostile.
# An untouched character is met at the neutral default.
disposition_rules:
  default: neutral
  rules:
    - has_tag: faction:wot:queens-guard:Hostile
      reaction: hostile
    - has_tag: faction:wot:queens-guard:Unfriendly
      reaction: hostile

# faction membership (faction.md §5.2): killing this mob shifts the
# killer's standing with the faction by the on-kill delta.
faction: queens-guard
