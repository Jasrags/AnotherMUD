id: haral-luhhan
name: Haral Luhhan
type: npc
behavior: stationary
description: |
  The village blacksmith is a great slab of a man, shoulders and arms corded
  from a life at the anvil, his beard and brows singed short and his hands
  marked with a hundred small white burn-scars. For all his size he handles
  iron with a careful, unhurried patience, and he has a smith's blunt honesty.
  He sizes up your hands as though wondering whether there is any use in them.
# Trainer + shop on one mob (crafting-and-cooking §4): `learn smithing` /
# `practice smithing` route through the trainer; `buy`/`list` through the shop.
tags: [humanoid, skill_trainer, shop]
keywords: [haral, luhhan, blacksmith, smith]
stats:
  hp_max: 42
  str: 16
disposition_rules:
  default: friendly
trainer:
  tier: apprentice
  teach:
    - smithing
properties:
  shop:
    sells:
      - wot:iron-ingot
      - wot:iron-hammer
      - wot:iron-pickaxe
      - wot:woodcutters-axe
      # equipment.md Simple-Melee arms the smith forges and sells.
      - wot:club
      - wot:light-mace
      - wot:heavy-mace
      - wot:sickle
      - wot:morningstar
      - wot:quarterstaff
      # equipment.md Martial-Melee arms.
      - wot:handaxe
      - wot:sap
      - wot:short-sword
      - wot:battleaxe
      - wot:rapier
      - wot:trident
      - wot:greataxe
      - wot:greatclub
      - wot:scythe
