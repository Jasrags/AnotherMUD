id: whitebridge-guard
name: a Queen's Guardsman
xp_value: 50  # kill experience (grouping.md §4)
type: npc
behavior: stationary
description: |
  A trim, well-kept soldier in the red coat and burnished breastplate of the
  Queen's Guard, the white collar of Andor bright at his throat, he holds the
  bridgehead with the bored competence of a man on easy duty in a peaceful town.
  He marks every stranger off the bridge from long habit, but his hand stays well
  clear of his sword; Whitebridge is the Queen's, and trouble here is rare and
  swiftly answered.
tags: [humanoid]
keywords: [guard, guardsman, soldier, queens]
stats:
  hp_max: 40
  str: 14
# faction.md §6: the Queen's Guard come down hard on a known lawbreaker — any
# character whose Queen's-Guard standing has fallen below Neutral. An untouched
# character reads at the starting Neutral standing and is met at the default.
disposition_rules:
  default: neutral
  rules:
    - faction: queens-guard
      max_standing: -1
      reaction: hostile

# faction membership (faction.md §5.2): killing this mob shifts the
# killer's standing with the faction by the on-kill delta.
faction: queens-guard
