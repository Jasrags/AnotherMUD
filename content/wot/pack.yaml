name: wot
version: "0.1.0"
# A world pack (character-identity §2): a leaf ruleset a character is
# stamped to and locked to (the tapestry-core baseline is a library).
kind: world
description: |
  The Wheel of Time world pack — the Two Rivers and outward
  (docs/themes/wot-world-plan.md). Original room/NPC prose set in the licensed
  WoT world (a non-commercial fan project); it uses factual geography and place
  names, never reproduced book text.

  Depends on the tapestry-core engine baseline (races, classes, slots, effects,
  abilities, channels, emotes). Boot it in place of the demo world with:
    ANOTHERMUD_PACKS=wot ANOTHERMUD_START_ROOM=wot:the-green

  M1: the village of Emond's Field (the Green, the Winespring Inn, the smithy,
  the Wisdom's cottage, the Winespring, and the road stubs out). The Two Rivers
  wilds and the wider Westlands land in M2+.
dependencies:
  tapestry-core: "*"
content:
  # WoT ships its own playable peoples (the nations of the Westlands are all
  # human) and overrides the core `human` by priority so a WoT boot uses the
  # setting-shaped entry; core's fantasy races (dwarf) live in starter-world.
  races:
    - races/*.yaml
  # WoT folds Dexterity into AC (armor-depth §3) — overrides the core
  # baseline's flat `defense: ac` with the d20 `defense: ac + dex_ac`.
  channel_map:
    - channel-map/*.yaml
  tracks:
    - tracks/*.yaml
  classes:
    - classes/*.yaml
  # The eleven human homelands of the Westlands (docs/wot/backgrounds.md) —
  # thin-slice creation packages (existing skills/items/feats + gold + flavor).
  backgrounds:
    - backgrounds/*.yaml
  # The tongues of the Westlands (docs/specs/languages.md): the regional dialects
  # of the Common speech (one comprehension family) plus the Old Tongue, Ogier,
  # Trolloc, and Aiel hand-speech. A background grants its home_language from this
  # set. Loader enumerates by this glob, NOT directory convention (the
  # backgrounds-glob lesson) — without it the languages silently register 0.
  languages:
    - languages/*.yaml
  feats:
    - feats/*.yaml
  # Faction/standing definitions (faction.md §2) — the Children of the Light,
  # Darkfriends, and the Queen's Guard. The loader enumerates by this glob.
  factions:
    - factions/*.yaml
  abilities:
    - abilities/*.yaml
  effects:
    - effects/*.yaml
  areas:
    - areas/*.yaml
  rooms:
    - rooms/*.yaml
  mobs:
    - mobs/*.yaml
  items:
    - items/*.yaml
  grades:
    - grades/*.yaml
  recipes:
    - recipes/*.yaml
  biomes:
    - biomes/*.yaml
  forage_tables:
    - forage_tables/*.yaml
  node_templates:
    - node_templates/*.yaml
  node_spawn_tables:
    - node_spawn_tables/*.yaml
  loot_tables:
    - loot_tables/*.yaml
