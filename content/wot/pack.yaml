name: wot
version: "0.1.0"
description: |
  The Wheel of Time world pack — the Two Rivers and outward
  (docs/themes/wot-world-plan.md). Original room/NPC prose set in the licensed
  WoT world (a non-commercial fan project); it uses factual geography and place
  names, never reproduced book text.

  Depends on the tapestry-core engine baseline (races, classes, slots, effects,
  abilities, channels, emotes). Boot it in place of the demo world with:
    ANOTHERMUD_PACKS=wot ANOTHERMUD_START_ROOM=wot:the-green

  M1: the village of Emond's Field (the Green, the Winespring Inn, the smithy,
  the Wisdom's cottage, the Winespring, and the road stubs out). The Two Rivers
  wilds and the wider Westlands land in M2+.
dependencies:
  tapestry-core: "*"
content:
  tracks:
    - tracks/*.yaml
  classes:
    - classes/*.yaml
  abilities:
    - abilities/*.yaml
  areas:
    - areas/*.yaml
  rooms:
    - rooms/*.yaml
  mobs:
    - mobs/*.yaml
  items:
    - items/*.yaml
  recipes:
    - recipes/*.yaml
  biomes:
    - biomes/*.yaml
  forage_tables:
    - forage_tables/*.yaml
  node_templates:
    - node_templates/*.yaml
  node_spawn_tables:
    - node_spawn_tables/*.yaml
  loot_tables:
    - loot_tables/*.yaml
