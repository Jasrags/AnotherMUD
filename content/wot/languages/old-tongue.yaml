id: old-tongue
name: the Old Tongue
# Its own family — a true barrier, not a dialect of Common. Mutually
# unintelligible with the everyday speech (languages.md §1).
family: old-tongue
description: |
  The Old Tongue, spoken in the Age of Legends and clung to since as the mark of
  a cultured mind. Nobles affect a few phrases; scholars and Aes Sedai read it;
  the Aiel keep it living in their daily speech. Beautiful, precise, and lost on
  anyone who has not studied it.
