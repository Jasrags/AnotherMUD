id: the-forge
area: emonds-field
name: "{r}The Smithy{x}"
description: |
  The village smithy stands open to the lane on its eastern side, the forge
  fire banked to a sullen orange glow and the anvil squatting black and
  scarred in the middle of the dirt floor. Tongs and hammers hang in ranks
  along the wall, a barrel of quenching water steams faintly, and finished
  work — hinges, harrow-teeth, a scythe blade — is stacked to one side waiting
  to be claimed. Heat rolls off the coals in a wave. The smithy stands at the
  western edge of the village where the Quarry Road begins; the road runs back
  east toward the Green, and west it runs on out of the village into the
  Westwood.
exits:
  east: quarry-road
  west: westwood-edge
terrain: indoors
# Tier-2 smithing station (crafting-and-cooking §4): the forge.
properties:
  craft_stations:
    smithing: 2
# §8 closure (M2): the M1 practice ingots are gone — a smith now mines iron ore
# from the diggings and smelts it (smelt-iron-ingot) into the ingot the dagger
# wants. The chain bottoms out in gathered ore.
# Finished work "stacked to one side waiting to be claimed" (see the
# description) — the S1 weapon-identity demo: a martial longsword a fighter
# wields cleanly, and an exotic ashandarei that fights an untrained hand
# (the non-proficient to-hit penalty).
items:
  - two-rivers-longsword
  # Size-and-wielding (S1.F) demo: the ashandarei is LARGE — a medium wielder
  # two-hands it (off hand tied up + the two-handed Strength bonus), an Ogier
  # would one-hand it. The Trolloc maul is HUGE — too large for a human to
  # wield at all (`equip maul` → refused). `equip ashandarei` then `equip maul`.
  - ashandarei
  - trolloc-maul
  # Two-weapon fighting (S1.K) demo: a belt knife is SMALL ⇒ light ⇒ off-hand
  # eligible. `equip longsword`, then `equip knife offhand` to dual-wield —
  # the off hand adds an extra attack each round (at a two-weapon to-hit penalty
  # on both hands and ½× Strength on the off-hand blow). A two-handed weapon
  # (the ashandarei) ties up the off hand, so it can't be paired with the knife.
  - belt-knife
  # The masterwork (S1.H) demo: a heron-mark blade among the finished work —
  # its grade alone (no hand-written modifier) hits truer when wielded.
  - heron-mark-blade
  # Ranged demo (ranged-combat §3): a Two Rivers longbow (exotic — a fighter
  # takes the non-proficient penalty), a stack of arrows it consumes per shot,
  # and a few fletcher's fine (masterwork) arrows that add to-hit and are spent
  # on use. `equip longbow`, `get arrow` (×N), `kill <foe>` to loose volleys.
  - two-rivers-longbow
  # Cross-room demo (ranged-combat §10, Model C): a plain SIMPLE hunting bow —
  # anyone wields it without penalty, so it hits cleanly. `get hunting-bow`,
  # `equip hunting-bow`, `get arrow` (×N), then `shoot archer east` to snipe the
  # brigand archer one room east on the Quarry Road — it charges back west into
  # the Smithy to retaliate (slice 2). Shares the longbow's "arrow" ammo.
  - hunting-bow
  - arrow
  - arrow
  - arrow
  - arrow
  - arrow
  - fine-arrow
  - fine-arrow
  # Armor-depth (S1.E) demo — finished smithwork waiting to be claimed. A
  # padded cap (LIGHT: a channeler wears it trained, keeps most Dex) and a great
  # helm (HEAVY: big AC bonus but clamps Dex to +1, and untrained on a channeler
  # so it fouls attacks). On `make run-wot`, an initiate: `score` (note AC),
  # `equip padded cap` → AC up by armor_bonus + Dex; `equip great helm` → clumsy
  # cue, AC reflects the +4 bonus but Dex capped to +1, and swings take the -1
  # non-proficient penalty.
  - padded-cap
  - great-helm
mobs:
  - haral-luhhan
