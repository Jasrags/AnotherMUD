id: the-forge
area: emonds-field
name: "{r}The Smithy{x}"
description: |
  The village smithy stands open to the lane on its eastern side, the forge
  fire banked to a sullen orange glow and the anvil squatting black and
  scarred in the middle of the dirt floor. Tongs and hammers hang in ranks
  along the wall, a barrel of quenching water steams faintly, and finished
  work — hinges, harrow-teeth, a scythe blade — is stacked to one side waiting
  to be claimed. Heat rolls off the coals in a wave. The smithy stands at the
  western edge of the village where the Quarry Road begins; the road runs back
  east toward the Green, and west it runs on out of the village into the
  Westwood.
exits:
  east: quarry-road
  west: westwood-edge
terrain: indoors
# Tier-2 smithing station (crafting-and-cooking §4): the forge.
properties:
  craft_stations:
    smithing: 2
# §8 closure (M2): the M1 practice ingots are gone — a smith now mines iron ore
# from the diggings and smelts it (smelt-iron-ingot) into the ingot the dagger
# wants. The chain bottoms out in gathered ore.
# Finished work "stacked to one side waiting to be claimed" (see the
# description) — the S1 weapon-identity demo: a martial longsword a fighter
# wields cleanly, and an exotic ashandarei that fights an untrained hand
# (the non-proficient to-hit penalty).
items:
  - two-rivers-longsword
  - ashandarei
mobs:
  - haral-luhhan
