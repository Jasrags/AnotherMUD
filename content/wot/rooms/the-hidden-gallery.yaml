id: the-hidden-gallery
area: mountains-of-mist
name: "A Hidden Gallery"
description: |
  A narrow gallery opens beyond the <feature>fissure</feature>, a pocket the old miners cut and then
  left off the maps — barely wide enough to stand in, the air close and still.
  Someone cached a few things here out of sight and never came back for them. The
  only way out is back <exit>east</exit> through the fissure into the diggings.
terrain: cave
# Lit-enough to read once a searcher slips in — a stub of candle burned down on a
# ledge. Keeps the alcove navigable so its cache reads without a torch.
properties:
  light: dim
exits:
  # The way back is NOT hidden — once you are inside, the diggings are in plain
  # view (hidden-exits §2: each side's hidden flag is authored independently).
  east: the-diggings
# Whatever the old miners squirreled away here: a little ready coin and a good
# knife left wrapped in oilcloth.
items:
  - purse-of-marks
  - belt-knife
