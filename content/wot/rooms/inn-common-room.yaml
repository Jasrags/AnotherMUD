id: inn-common-room
area: emonds-field
name: "{y}The Winespring Inn — Common Room{x}"
description: |
  The common room of the Winespring Inn is low-beamed and warm, a fire of
  good Two Rivers oak snapping in a broad stone hearth and the smell of ale and
  wax and woodsmoke thick in the air. Polished tables crowd the floor, scarred
  by years of dice and elbows, and a long counter runs down one side where the
  innkeeper keeps his casks and his accounts. A doorway north opens on the heat
  and clatter of the kitchen; a stair climbs to the guest rooms above, and the
  Green lies back out through the front door to the west.
exits:
  west: the-green
  north: inn-kitchen
  up: inn-guestroom
terrain: indoors
# Rest by the hearth: a room-level regen bonus (economy-survival §5.7).
# Also lights the inn marker on the map (player-maps §6) — Bran is a plain
# innkeeper, not a shop, so the rest bonus is what the room reads as.
healing_rate: 2
mobs:
  - bran-alvere
  # Loial the Ogier (the iconic Two Rivers Ogier; non-playable NPC race) folded
  # into a chair by the fire — book-faithful (he comes to Emond's Field with
  # Perrin) and a fitting first encounter with the Ogier race a step off the Green.
  - loial
