id: market-street
area: baerlon
name: "{w}Baerlon — Market Street{x}"
description: |
  The town's main street is a churn of mud and traffic, lined with the
  shuttered fronts of merchants and chandlers and loud with the cries of
  hawkers working the crowd. Miners come down off the slopes shoulder to
  shoulder with wagoners, peddlers, and hard-eyed strangers, and through the
  press a pair of white-cloaked <threat>Children of the Light</threat> walk untouched, the crowd
  parting around them like water round a stone. The Mountain Gate stands back to
  the <exit>west</exit>; the lamps of an inn glow to the <exit>north</exit>, a silversmith's shop shows
  <exit>south</exit>, and ahead <exit>east</exit> the street runs on to the Town Square at the heart of
  Baerlon.
exits:
  west: the-mountain-gate
  north: the-stag-and-lion
  south: the-silverworks
  east: the-town-square
terrain: outdoors
mobs:
  - child-of-the-light
