id: watch-hill-green
area: watch-hill
name: "{g}Watch Hill — the Green{x}"
description: |
  Watch Hill's green is a smaller, steeper thing than Emond's Field's, tilted
  along the slope so that everything in the village seems to lean a little toward
  the view. A handful of stone houses stand about it, and a low inn faces the
  green from the east. The North Road climbs in from the south; a path leads up
  to the crown of the hill and its lookout to the north.
exits:
  south: the-north-pasture
  east: watch-hill-inn
  north: watch-hill-lookout
terrain: outdoors
