id: taren-ferry
area: taren-ferry
name: "{y}Taren Ferry{x}"
description: |
  The village is a single crooked street of houses set up on stone pilings
  against the river's floods, all of them turned to face the water and the
  ferry that is the village's whole reason for being. A handful of folk watch
  you from doorways with quick, measuring eyes, already reckoning what you might
  be worth. The Taren Road runs back south toward Watch Hill; the street drops
  north to the ferry landing on the bank.
exits:
  south: taren-road
  north: the-ferry-landing
terrain: outdoors
mobs:
  - taren-villager
