id: emonds-field-green
area: emonds-field
name: "{g}The Green{x}"
description: |
  You stand on the wide common Green at the heart of Emond's Field, where the
  hard-packed lanes of the village run together into trampled grass. The
  Winespring Inn rises nearby on its low stone foundation, whitewashed and
  red-roofed, and from somewhere close comes the steady chuckle of the
  Winespring itself, its water welling cold and sweet out of the rocks.
  Woodsmoke and the smell of fresh baking drift between the houses, and beyond
  the thatched roofs the dark line of the Westwood marks where the farms give
  way to trees. It is a quiet, settled place, a long way from anywhere a map
  would trouble to name.
terrain: outdoors
