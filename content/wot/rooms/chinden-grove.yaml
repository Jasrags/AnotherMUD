id: chinden-grove
area: stedding-chinden
name: "{g}The Treesong Grove{x}"
description: |
  Here the great trees stand thickest, and they are wrong in a way that takes the
  breath — not wrong, but *shaped*, trunks and boughs flowing into bowls and
  arches and slow spirals no axe and no season could have made. This is a
  Treesong grove, where the Ogier sing wood into living form rather than cut it,
  and a low wordless music threads the air, felt in the chest more than heard. To
  the north, half-swallowed by ivy, something stands that is not a tree. The Stump
  lies east.
exits:
  east: chinden-stump
  north: chinden-waygate
terrain: forest
# Within the stedding's bound: the One Power is still here — a channeler
# cannot weave in this room (other-worlds.md §Stedding; the cast gate reads this tag).
tags: [stedding, safe-room]
# The stedding's aura of peace (other-worlds.md §Stedding): a passive regen bonus
# felt by all in the room, channeler or not, and `safe-room` forbids violence.
healing_rate: 2
mobs:
  - chinden-treesinger
