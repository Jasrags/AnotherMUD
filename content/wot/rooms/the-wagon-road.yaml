id: the-wagon-road
area: caemlyn-road
name: "{g}The Caemlyn Road — the Wagon Road{x}"
description: |
  Here the traffic thickens to a near-constant stream of ore-wagons and
  merchant trains, for this stretch gathers in the rough roads that come up out
  of the mining country to the south to join the Caemlyn Road. The verges are
  churned to mud and littered with the wreckage of the trade — a cast horseshoe,
  a split barrel, the bones of a foundered ox. The land feels harder-used and
  less friendly than the farmland behind. Whitebridge lies far back west;
  ahead east, the mean roofs of Four Kings show against the sky.
exits:
  west: the-eastward-road
  east: the-four-kings-approach
terrain: grassland
