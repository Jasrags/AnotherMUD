id: the-caemlyn-square
area: caemlyn
name: "{w}Caemlyn — the Great Square{x}"
description: |
  The avenue opens into a vast cobbled square at the centre of the New City,
  ringed with the grand fronts of guildhalls and counting-houses and loud with
  the business of a great capital. Above the rooftops rises the second wall and
  the white-towered <feature>crown of the Inner City</feature>, catching the light like something
  out of a story; folk gather here just to stand and look at it. A famous old
  inn, the Queen's Blessing, fronts the square to the <exit>north</exit>. The New City avenue
  runs back <exit>west</exit>; <exit>east</exit>ward the busy way to the Sunrise Gate and the Cairhien road
  opens, and <exit>south</exit> Full Moon Street runs down to divide the New City from the
  Inner City within.
exits:
  west: the-new-city
  north: the-queens-blessing
  east: the-sunrise-gate
  south: the-full-moon-street
terrain: outdoors
