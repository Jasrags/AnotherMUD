id: the-diggings
area: mountains-of-mist
name: "The Old Diggings"
description: |
  A low cut bites into the hillside here, the stone around its mouth scarred by
  generations of pick-work and the air breathing out cool and mineral-damp from
  the dark within. Rust-red seams of iron thread the grey rock, close enough to
  the surface to break loose with the right tool. The Sand Hills and the long
  way back to the village lie east; a worked shaft drops away into deeper dark
  below.
exits:
  east: sand-hills-foot
  down: deep-diggings
terrain: cave
# A pickaxe left at the digging face — the mining-tool the iron veins require
# (gathering §3.3). Also sold by Haral; left here so a new miner can start.
items:
  - iron-pickaxe
