id: quarry-road
area: emonds-field
name: "The Quarry Road"
description: |
  Here the Quarry Road leaves the western edge of Emond's Field, running off as
  a rutted cart track toward the dark line of the Westwood and, beyond it, the
  grey shoulders of the Mountains of Mist. The village smithy stands close on
  the west side, smoke rising from its roof; a lane turns off north to the
  Wisdom's cottage on the village edge, and a track runs south toward the al'Thor
  farm out by the Westwood. The Green lies back east; the road west peters out at
  the field's edge for now.
exits:
  east: the-green
  west: the-forge
  north: wisdoms-cottage
  south: the-althor-farm
terrain: outdoors
# Ranged-combat demo (MR3): a hostile brigand archer lurks on the cart track,
# wielding a Two Rivers longbow (a projectile). He aggros on sight — the fight
# opens at the FAR band and he looses while a melee foe closes (ranged-combat
# §5.2). One step `east` from the Smithy (the §33 WoT boot start).
mobs:
  - brigand-archer
  # Two-weapon-fighting §2.3 (dual-wield demo): a cutthroat fights with a
  # longsword and an off-hand belt knife — a main swing AND an off-hand strike
  # each round, the mob mirror of player dual-wielding.
  - brigand-cutthroat
# M1 stub: the road west into the Westwood and up the Quarry Road to the Sand
# Hills + Mountains-of-Mist diggings lands in M2 (the wilds).
