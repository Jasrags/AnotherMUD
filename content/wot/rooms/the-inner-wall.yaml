id: the-inner-wall
area: caemlyn
name: "{w}Caemlyn — the Inner City Wall{x}"
description: |
  The wall of the Inner City rises sheer before you, and it is like nothing else
  in the world of men: a hundred feet of seamless white stone shot through with
  veins of silver that take the sun and throw it back in a soft blaze, laid by
  Ogier masons in the first age after the Breaking and unweathered by all the
  centuries since. A great gate stands open in it, watched but unbarred, and
  beyond it the ancient city climbs its hill in tiers of garden and tower. The
  great square lies back west; the Inner City waits east through the gate.
exits:
  west: the-caemlyn-square
  east: the-inner-city
terrain: outdoors
