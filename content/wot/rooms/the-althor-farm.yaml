id: the-althor-farm
area: emonds-field
name: "The al'Thor Farm"
description: |
  A little way south of the Quarry Road, hard against the edge of the Westwood and
  the rise of the Sand Hills, stands the al'Thor farm — a snug stone <feature>farmhouse</feature> and
  a tidy yard, the fields running back toward the trees and a flock of blackface
  sheep cropping the high pasture above. It is a quiet, well-tended, out-of-the-way
  place, further from the village than most and the better liked for it by those
  who live there. The Quarry Road and the way back to the village lie <exit>north</exit>.
exits:
  north: quarry-road
terrain: outdoors
# Stable access point (mounts.md §3.1): Aldin keeps the district's paddock here
# at the out-of-the-way farm. `stable`/`unstable` and `buymount` work in his
# room — a saddle mare bought here carries a rider the long roads (the riding
# horse is spawned on purchase from his `sells` map, never placed loose).
mobs:
  - ostler
