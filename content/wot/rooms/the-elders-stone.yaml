id: the-elders-stone
area: mountains-of-mist
name: "{g}The Elder's Stone{x}"
description: |
  A single great <feature>stone</feature> stands beside the way where the vale narrows toward the
  trees, its face worn smooth and graven deep with flowing Ogier script no human
  hand could cut. It marks a threshold: a stillness lies beyond it that the skin
  feels before the mind names it, the held breath of a place older than kingdoms.
  This is the bound of Stedding Chinden. The great trees and the stedding proper
  lie <exit>west</exit>; the vale runs back <exit>east</exit> toward the pass.
exits:
  east: the-vale-of-chinden
  west: chinden-stump
terrain: field
# The threshold of the stedding (other-worlds.md §Stedding): everything WEST of
# this marker — the stedding-chinden area — is the stedding interior, where a
# future `is_stedding` flag will still the One Power, bar Shadowspawn, and block
# Tel'aran'rhiod. This room is the bound itself; the flag rides the interior.
