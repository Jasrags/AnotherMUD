id: westwood-edge
area: westwood
name: "{g}The Edge of the Westwood{x}"
description: |
  The Quarry Road dwindles to a footpath here as the village fields give out
  and the first trees of the Westwood close in — oak and leatherleaf, the
  ground soft underfoot with old leaves and dappled where the light comes
  through. It is a friendly enough stretch of wood, picked over by villagers
  for kindling and herbs. The <feature>smithy</feature> and the village lie back <exit>east</exit>; the <feature>trees</feature>
  thicken away to the <exit>west</exit>.
exits:
  east: the-forge
  west: deep-westwood
terrain: forest
# An axe left leaning against a stump — the woodcutting-tool the timber stands
# require (gathering §3.3). Also sold by Haral; left here so a new woodcutter
# can start.
items:
  - woodcutters-axe
