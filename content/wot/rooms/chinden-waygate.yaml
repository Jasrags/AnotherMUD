id: chinden-waygate
area: stedding-chinden
name: "{g}The Overgrown Waygate{x}"
description: |
  Set into a low rise at the grove's edge stands a slab of silvery metal twice
  the height of a tall man, its surface a single carved thicket of vine and leaf
  so fine and so deep it seems to stir at the corner of the eye. A <feature>Waygate</feature> — one
  of the old roads the Ogier made in the Breaking — but the trefoil Avendesora
  leaf that would open it is gone, prised loose and hidden, and ivy has grown
  thick across the silver. The Ogier have not walked the Ways since they turned
  foul, and they do not mean to open this one. The grove lies back <exit>south</exit>.
exits:
  south: chinden-grove
terrain: forest
# Within the stedding's bound: the One Power is still here — a channeler
# cannot weave in this room (other-worlds.md §Stedding; the cast gate reads this tag).
tags: [stedding, safe-room]
# The stedding's aura of peace (other-worlds.md §Stedding): a passive regen bonus
# felt by all in the room, channeler or not, and `safe-room` forbids violence.
healing_rate: 2
# Lore + a future hook (other-worlds.md §The Ways): the Waygate is deliberately
# SHUT — the Avendesora leaf is missing — so it is non-functional today. When/if
# the Ways are built as a realm-graph, this is Chinden's gateway node.
