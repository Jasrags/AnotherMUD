id: sand-hills-foot
area: mountains-of-mist
name: "{y}The Sand Hills{x}"
description: |
  The trees fall away and the ground breaks up into the Sand Hills, low stony
  rises of grey rock and thin soil where the Westwood surrenders to the
  mountains. A cold wind comes down off the heights, and the going grows hard
  underfoot, all loose scree and shouldered stone. The wood lies back <exit>east</exit>; <exit>west</exit>,
  a dark <feature>cleft</feature> in the hillside marks where the old diggings cut into the rock.
  Few ever look up — but a faint <feature>trail</feature> switches away into the cloud above,
  climbing toward the high passes of the Mountains of Mist.
exits:
  east: deep-westwood
  west: the-diggings
  up: the-mist-trail
terrain: mountain
