id: the-mist-road
area: baerlon-road
name: "{w}The Skirts of the Mountains of Mist{x}"
description: |
  The road winds higher into the foothills, and the great peaks of the Mountains
  of Mist close in grey and enormous on every side, their heads lost in the cloud
  that gives the range its name. Mist drifts in the hollows even at midday, cold
  and clinging, and the only sounds are the wind, the clatter of falling stone,
  and somewhere far off the bawl of a mountain sheep. The track from Baerlon
  falls away <exit>south</exit>; ahead <exit>north</exit>, tucked into a sheltered fold of the mountains,
  lie the roofs of Comfrey.
exits:
  south: the-comfrey-road
  north: comfrey-green
terrain: mountain
