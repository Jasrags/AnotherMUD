id: the-caemlyn-road
area: caemlyn-road
name: "{g}The Caemlyn Road{x}"
description: |
  East of Baerlon's Caemlyn Gate the road broadens and the going turns easy, a
  fine wide highway of packed gravel running between hedged fields where Andoran
  farmers bring in the hay. Traffic thickens with every mile — a merchant's train
  of canvas-topped wagons, a drover walking cattle to market, a Queen's courier
  who passes at a hard gallop without a glance. The road runs on east toward the
  river country and the White Bridge; Baerlon and its gate lie back west.
exits:
  west: the-caemlyn-gate
  east: the-arinelle-vale
terrain: grassland
