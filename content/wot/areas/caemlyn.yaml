id: caemlyn
name: Caemlyn
description: |
  The capital of Andor and the fairest city in the west of the world — a great
  ring of grey wall enclosing the bustling New City of red brick and shining
  slate, and within that, raised on its own hill behind a second wall, the
  ancient Inner City: white-towered, garden-hung, its silver-streaked stone
  laid by Ogier hands in the first days after the Breaking and unmatched by
  anything men have built since. Here the Queen of Andor keeps her court in the
  Royal Palace, the roads of half the realm meet, and the trade and rumour and
  splendour of a great kingdom all come together under the rising-sun banner.
region: andor
