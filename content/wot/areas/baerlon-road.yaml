id: baerlon-road
name: The Baerlon Road
description: |
  North of the Taren the easy green of the Two Rivers gives way at once to
  Andor proper: a harder, plainer country of stony pasture and wind-bent
  hedgerow, climbing all the while toward the grey wall of the Mountains of
  Mist. The road that runs through it is an Andoran road — wider, older, and
  busier than anything south of the river — bound for the mining town of
  Baerlon under the peaks. This is the first stretch of the wide world beyond
  home, and it does not pretend to be friendly.
region: andor
