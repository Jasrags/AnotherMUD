id: taren-ferry
name: Taren Ferry
description: |
  The northernmost settlement of the Two Rivers, clinging to the south bank of
  the River Taren where the only road out of the district meets the only
  crossing — a rope-and-barge ferry worked by the Ferry family. The rest of the
  Two Rivers holds Taren Ferry folk a little sharp, a little too fond of a
  bargain, and not quite to be trusted; the ferry folk return the compliment.
region: two-rivers
