id: emonds-field
name: Emond's Field
description: |
  A farming village in the Two Rivers, the far-western corner of Andor — so
  far from any throne that the folk here govern themselves, keep their own
  Mayor and Village Council, and barely think of themselves as Andoran at all.
region: two-rivers
# Temperate climate; the Two Rivers weather zone lands with the wilds (M2).
