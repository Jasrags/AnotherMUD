id: four-kings
name: Four Kings
description: |
  A grubby, mean-spirited town in the middle of Andor, grown up where the rough
  roads from the southern mines cross the Caemlyn Road and existing for no reason
  but the trade that passes through it. Four Kings lives off the merchant trains
  — wagon-yards, cheap inns, cheaper liquor, and a transient population of
  teamsters, peddlers, and folk who would rather not be asked their business.
  There is no wall, no Queen's Guard worth the name, and little law a hard coin
  cannot bend; a careful traveller keeps a hand on his purse and his back to a
  wall, and does not linger after dark.
region: andor
