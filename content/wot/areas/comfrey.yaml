id: comfrey
name: Comfrey
description: |
  A small, hardy upland settlement tucked into a sheltered fold of the Mountains
  of Mist north-west of Baerlon, on the very edge of the settled world. Comfrey
  lives off the high pasture, a little mining, and the trickle of trade that
  passes on the back-country road; its folk are weathered and close-mouthed and
  used to the mist and the cold, and they reckon anyone from below the foothills
  a soft outlander. Beyond it the Mountains of Mist climb on into cloud and
  silence.
region: andor
