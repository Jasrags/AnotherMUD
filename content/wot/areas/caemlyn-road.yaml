id: caemlyn-road
name: The Caemlyn Road
description: |
  The great east-west spine of Andor, running clear across the kingdom from the
  White Bridge over the Arinelle to the gates of Caemlyn itself. Here at its
  western end it carries the trade of half the realm — merchant trains, ore
  wagons down from Baerlon, drovers and peddlers and the Queen's couriers — over
  open, rolling farmland that falls away gradually toward the river. After the
  thin pasture of the high country it feels prosperous and busy and safe, a real
  road in a settled land.
region: andor
