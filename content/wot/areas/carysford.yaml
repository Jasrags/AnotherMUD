id: carysford
name: Carysford
description: |
  A pretty river-village on the Caemlyn Road where it crosses the little River
  Cary by an old stone ford, the last quiet stop before the road runs on to the
  capital. Willows trail in the slow green water, a watermill turns on the far
  bank, and the village makes its modest living off the river-trade and the
  travellers who pause to water their teams and take a meal in sight of Caemlyn's
  distance. It is a settled, easy place, proud of its ford and its mill and
  little troubled by the wide world that passes through it.
region: andor
