id: whitebridge
name: Whitebridge
description: |
  A bustling river town on the eastern bank of the Arinelle, grown up where the
  Caemlyn Road crosses the great White Bridge that gives the place its name. It
  is a town of trade and travellers — the last sizeable stop before the long road
  east to Caemlyn, a landing for the river craft that work down to Illian, and a
  crossroads where the news and the rumour of half of Andor change hands over ale
  and bargains. The Queen's law holds here, after a fashion, and the wonder of the
  bridge draws a stare from every newcomer who has never seen the like.
region: andor
