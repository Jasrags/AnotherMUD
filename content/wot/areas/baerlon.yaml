id: baerlon
name: Baerlon
description: |
  A large walled town in the far west of Andor, set in the foothills of the
  Mountains of Mist and grown fat on the iron and silver the miners dig out of
  the peaks above. Within its wooden wall the streets are crowded and close,
  loud with the trade of half a dozen roads that meet here, and watched — by
  the Queen's men, by the merchants' guards, and lately by the white-cloaked
  Children of the Light, who have taken to walking the streets as though they
  owned them. To Two Rivers eyes it is a city; to the rest of Andor it is a
  rough mining town a long way from anywhere.
region: andor
