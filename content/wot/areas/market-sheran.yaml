id: market-sheran
name: Market Sheran
description: |
  A prosperous farming village on the Caemlyn Road east of Four Kings, as honest
  and settled as Four Kings is mean — a tidy place of stone-and-thatch houses
  about a proper green, a market that gives the village its name, and well-tended
  fields running out to every horizon. The folk are Andoran farmers, hard-working
  and close with a coin and a touch wary of strangers in uncertain times, but the
  Queen's peace holds here and a civil traveller is met civilly enough.
region: andor
