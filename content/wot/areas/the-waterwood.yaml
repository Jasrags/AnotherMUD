id: the-waterwood
name: The Waterwood
description: |
  The low, wet country along the eastern edge of the Two Rivers, where the land
  loses its nerve and dissolves into fen — a maze of reed-beds, black standing
  pools, and drowned trees that the folk of Deven Ride call the Mire and stay
  well clear of. The White River loses itself somewhere in the heart of it. The
  Waterwood gives fenroot and reed and a living to the handful of trappers bold
  enough to work it, but it takes the unwary just as readily: the footing lies,
  the leeches are patient, and there are older, quieter things in the deep water
  that the Wisdom would rather you did not go looking for.
region: two-rivers
