id: mountains-of-mist
name: The Mountains of Mist
description: |
  The grey western wall of the Two Rivers, its lower slopes broken into stony
  sand-hills where the Westwood gives out. Old diggings cut into the rock here,
  worked for iron in years long past and worth working still by anyone with a
  pick and the patience to swing it.
region: two-rivers
reset_interval: 300
