id: arien
name: Arien
description: |
  A small waystop on the Caemlyn Road between Whitebridge and Four Kings, no more
  than an inn, a wainwright's yard, and a scatter of houses where the highway
  pauses for breath. Arien lives off the wagon trade that never stops rolling
  through it — a place to change a wheel, water a team, and sleep a night under a
  roof — and asks nothing of a traveller but his custom and that he move along in
  the morning.
region: andor
