# WoT S2 weave — Spirit/Air. A woven ward of hardened Air that turns blows
# and steadies the channeler's focus: a short self-buff (no combat target).
# Spell-with-effect ⇒ non-offensive; re-weaving before it lapses fizzles as
# effect_present (§4.3 step 7) rather than refreshing. (Element: Air/Spirit.)
id: warding
name: Warding
type: active
category: spell

# The Five Powers this weave draws on (WoT S2 affinities). A two-element
# weave: its potency follows the channeler's weaker affinity of the two.
elements:
  - air
  - spirit

default_cap: 30
gain_base_chance: 20
gain_failure_multiplier: 0.5
gain_stat: wis
gain_stat_scale: 0.1

# A longer cast time than the offensive weaves — you take a moment to set
# the ward.
cost: 8
pulse_delay: 4
cast_time: 2
variance: 0

# Self-targeted ward: a modest armor + to-hit steadying for its duration.
effect:
  id: warding
  duration: 12
  modifiers:
    - stat: ac
      value: 2
    - stat: hit_mod
      value: 1
