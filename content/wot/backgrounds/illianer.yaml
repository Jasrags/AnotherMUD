# See aiel.yaml for the WoT background contract (thin slice; docs/specs/backgrounds.md §2).
id: illianer
name: Illianer
tagline: Of Illian, where the Hunt of the Horn is called.
description: |
  You are of Illian on the Sea of Storms, ruled by King, Council of Nine, and
  the commoners' Assemblage. Illianers despise tyranny but love a spectacle, and
  speak with the thick, rolling accent outsiders strain to follow. Yours is a
  great trading nation — and the city from which the Hunters of the Horn ride
  out into legend.
# Illianer background skills (docs/wot/backgrounds.md): Search (Craft,
# Intimidate, Knowledge have no engine skill). Search collapses onto Perception
# (skills.md).
skills:
  - ability: perception
    proficiency: 10
# Militia — Illian's companies drill its citizens. One feat per background (the pick-one chooser lands later).
feats:
  - militia
# Pick-one equipment package (docs/wot/backgrounds.md Table 2-1): a courtier's
# outfit with a light crossbow, a short sword with trail rations and balms, or a
# bundle of trade goods.
items: []
equipment_packages:
  - [courtiers-outfit, light-crossbow]
  - [short-sword, trail-rations, healers-balm, healers-balm]
  - [trade-goods]
gold: 30
allowed_categories:
  - humanoid
