# See aiel.yaml for the WoT background contract (thin slice; docs/specs/backgrounds.md §2).
id: taraboner
name: Taraboner
tagline: Of Tarabon, where the face is kept veiled.
description: |
  You hail from Tarabon in the humid southwest, its capital Tanchico sprawled
  across three peninsulas. Taraboners define themselves by the veil — to bare
  your face in private company is a discourtesy — and trace their pride to the
  Age of Legends. You learned the trades of a great harbor city, and the quiet
  skills that thrive in its crowded lanes.
# Taraboner background skills (docs/wot/backgrounds.md): Open Lock, Hide, Move
# Silently (Appraise has no engine skill) — use-based proficiencies, taught at a
# modest starting proficiency.
skills:
  - ability: open-lock
    proficiency: 10
  - ability: hide
    proficiency: 10
  - ability: move-silently
    proficiency: 10
feats: []
# Pick-one equipment package (docs/wot/backgrounds.md Table 2-1): a burglar's kit
# of tools, lantern, crowbar, and mirror; masterwork artisan's tools; or a single
# precious Illuminator's rocket.
items: []
equipment_packages:
  - [thieves-tools, hooded-lantern, crowbar, steel-mirror]
  - [artisans-tools]
  - [illuminators-rocket]
gold: 30
allowed_categories:
  - humanoid
