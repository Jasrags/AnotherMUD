# See aiel.yaml for the WoT background contract (thin slice; docs/specs/backgrounds.md §2).
id: borderlander
name: Borderlander
tagline: Raised in the shadow of the Blight.
description: |
  You come from the Borderlands — Saldaea, Kandor, Arafel, or fallen Shienar —
  the kingdoms that stand watch along the Blight. "Peace, Beauty, Life" is your
  creed, and you value all three the more for living a day's ride from the
  Shadow. Hard-bitten and unflinching, you learned the sword and the watchtower
  before you learned to read.
# Borderlander background skills (docs/wot/backgrounds.md): Listen, Move
# Silently (Knowledge (Blight) and Ride have no engine skill). Listen collapses
# onto Perception (skills.md).
skills:
  - ability: move-silently
    proficiency: 10
  - ability: perception
    proficiency: 10
# Strong Soul — the hard-bitten Blight-warden's save feat (+1 Fortitude and Will;
# a Borderlander background feat). One feat per background in the thin slice, in
# place of the pick-one chooser; Stealthy/Blooded are the canonical alternates.
feats:
  - strong-soul
# Studded leather, a Borderland soldier's serviceable armor. The horse, lances,
# and heavier kit of the full package await later phases.
items:
  - studded-leather
gold: 20
allowed_categories:
  - humanoid
