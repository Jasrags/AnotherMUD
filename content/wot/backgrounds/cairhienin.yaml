# See aiel.yaml for the WoT background contract (thin slice; docs/specs/backgrounds.md §2).
id: cairhienin
name: Cairhienin
tagline: A player of the Great Game.
description: |
  You were born to Cairhien of the Topless Towers, where Daes Dae'mar — the
  Game of Houses — is breathed in with the air. You crave order, plan three
  moves ahead, and read a room's loyalties before you cross it. Fair-skinned and
  dark-eyed, you wear your ambitions as carefully as a noble wears the slashes
  of rank.
skills: []
# Militia — drilled with the city militia of Cairhien. One feat per background (the pick-one chooser lands later).
feats:
  - militia
# Pick-one equipment package (docs/wot/backgrounds.md Table 2-1): a longsword and
# steel mirror (the RPG pairs these with a military saddle — mount deferred), an
# hourglass and two balms, or a noble's outfit and signet ring.
items: []
equipment_packages:
  - [longsword, steel-mirror]
  - [hourglass, healers-balm, healers-balm]
  - [nobles-outfit, signet-ring]
gold: 35
# Home + bonus languages (docs/wot/backgrounds.md Table 2-1; languages.md §3).
home_language: common-cairhien
bonus_languages: [common-aiel, common-borderlands, common-midlands, common-tairen]
allowed_categories:
  - humanoid
