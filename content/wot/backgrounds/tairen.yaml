# See aiel.yaml for the WoT background contract (thin slice; docs/specs/backgrounds.md §2).
id: tairen
name: Tairen
tagline: Of Tear, beneath the shadow of the Stone.
description: |
  You are of Tear, the great port at the mouth of the Erinin, guarded by the
  fortress-Stone that has never fallen. Tairen nobles are proud to the edge of
  arrogance, the divide between High Lord and commoner rigid as stone. In Tear
  the Power is forbidden and the Prophecies of the Dragon are outlawed — a law
  you grew up never questioning aloud.
# Tairen background skills (docs/wot/backgrounds.md): Search (Profession, Ride,
# Sense Motive have no engine skill). Search collapses onto Perception
# (skills.md).
skills:
  - ability: perception
    proficiency: 10
# Militia — the Defenders' levy trains Tairen commoners. One feat per background (the pick-one chooser lands later).
feats:
  - militia
# Pick-one equipment package (docs/wot/backgrounds.md Table 2-1): a courtier's
# outfit (the RPG pairs it with a light horse — mount deferred), a gambler's
# purse and gaming set, or a mail shirt. (The RPG's two near-identical money
# options are collapsed into the single purse package.)
items: []
equipment_packages:
  - [courtiers-outfit]
  - [purse-of-marks, gaming-set]
  - [mail-shirt]
gold: 35
allowed_categories:
  - humanoid
