id: midlander
name: Midlander
tagline: Of the heartlands — solid, dependable, slow to anger.
description: |
  You come from the broad middle of the westlands — Andor, Murandy, the Two
  Rivers, Baerlon and beyond — the settled farms and market towns that feed the
  world. Midlanders are steady, hard-working, and slow to anger, and some carry
  the old blood of Manetheren under plain wool. You leave home with a working
  blade and a countryman's practical kit.
