# See aiel.yaml for the WoT background contract (thin slice; docs/specs/backgrounds.md §2).
id: midlander
name: Midlander
tagline: Of the heartlands — solid, dependable, slow to anger.
description: |
  You come from the broad middle of the westlands — Andor, Murandy, the Two
  Rivers, Baerlon and beyond — the settled farms and market towns that feed the
  world. Midlanders are steady, hard-working, and slow to anger, and some carry
  the old blood of Manetheren under plain wool. You leave home with a working
  blade and a countryman's practical kit.
skills: []
# Luck of Heroes — the Midlander's signature feat (+1 luck on all saves); some
# carry the old blood of Manetheren. One feat per background (the chooser lands
# later); Militia/Strong Soul are the canonical alternates.
# Pick-one background feat (the chooser): Luck of Heroes (the old blood of
# Manetheren), Strong Soul, or Militia — all canonical Midlander feats.
feat_options:
  - luck-of-heroes
  - strong-soul
  - militia
# Pick-one equipment package (docs/wot/backgrounds.md Table 2-1): a healer's kit
# (the RPG pairs it with a light horse — mount deferred), the boar-spear /
# longsword / leather / shield / tent soldier's kit, or a Two Rivers longbow.
equipment_packages:
  - [healers-kit]
  - [boarspear, longsword, leather-armor, small-steel-shield, tent]
  - [two-rivers-longbow]
gold: 20
allowed_categories:
  - humanoid
