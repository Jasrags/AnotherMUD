# See aiel.yaml for the WoT background contract (thin slice; docs/specs/backgrounds.md §2).
id: ebou-dari
name: Ebou Dari
tagline: Of the canal city, where any insult ends in a duel.
description: |
  You were raised in Ebou Dar, the canal-cut port at the mouth of the Eldar,
  under its elaborate code of manners and its readiness to settle any slight
  with a knife. Polite and easygoing until offended, you carry a curved blade in
  your sash and know the city's locks and back ways as well as its duelling
  circles.
# Open Lock is one of the Ebou Dari background skills and exists as an engine
# skill (use-based proficiency) — taught at a modest starting proficiency.
skills:
  - ability: open-lock
    proficiency: 10
feats: []
# A belt knife — the everyday blade of the Rahad. The marriage knife and
# thieves' tools of the full package await their item templates.
items:
  - belt-knife
gold: 25
allowed_categories:
  - humanoid
