# See aiel.yaml for the WoT background contract (thin slice; docs/specs/backgrounds.md §2).
id: domani
name: Domani
tagline: Of Arad Doman — trader, schemer, charmer.
description: |
  You hail from Arad Doman, between the Mountains of Mist and the Aryth Ocean,
  where trade, politics, and pleasure are practiced as one art. Domani are
  cunning bargainers and famed for a charm that disarms; you were taught to read
  a counterpart's wants and turn them to your profit. A full purse opens more
  doors than a drawn blade.
skills: []
# Militia — Arad Doman keeps a trained levy. One feat per background (the pick-one chooser lands later).
feats:
  - militia
# Pick-one equipment package (docs/wot/backgrounds.md Table 2-1): a jeweled
# signet ring, a courtier's outfit with two bottles of fine wine, or a masterwork
# musical instrument. (Gold normalized back to the peer baseline now that the
# thin-slice empty-items purse is replaced by real packages.)
items: []
equipment_packages:
  - [jeweled-signet-ring]
  - [courtiers-outfit, fine-wine, fine-wine]
  - [musical-instrument]
gold: 30
# Home + bonus languages (docs/wot/backgrounds.md Table 2-1; languages.md §3).
home_language: common-arad-doman
bonus_languages: [common-athaan-miere, common-borderlands, common-midlands, common-tarabon]
allowed_categories:
  - humanoid
