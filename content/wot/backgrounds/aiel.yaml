# A WoT human background (docs/wot/backgrounds.md; docs/specs/backgrounds.md §2):
# the homeland/culture a character arises from, granting a one-time starting
# package. THIN SLICE — only skills/items/feats that already exist are granted;
# the RPG's languages, skill/weapon restrictions, "pick one feat", and the full
# equipment-package choice are deferred (later phases). allowed_categories is
# authored for correctness even though the wizard does not yet enforce it.
id: aiel
name: Aiel
tagline: Of the Three-fold Land, bound by ji'e'toh.
description: |
  You were raised in the Aiel Waste, the harsh desert your people call the
  Three-fold Land. Honor and obligation — ji'e'toh — order your every act; a
  debt of toh must be repaid, and shame is worse than any wound. You move
  veiled and silent, and you despise the soft wetlanders who have never known
  thirst. By custom you will not touch a sword.
# Aiel background skills (docs/wot/backgrounds.md): Hide, Move Silently, Spot.
# Spot collapses onto the engine's Perception surface (skills.md). Granted at a
# novice-trained proficiency.
skills:
  - ability: hide
    proficiency: 10
  - ability: move-silently
    proficiency: 10
  - ability: perception
    proficiency: 10
# Stealthy is one of the Aiel background feats (the only one that yet exists as
# engine content); a thin-slice grant in place of the RPG's pick-one chooser.
# Pick-one background feat (the chooser): Stealthy (desert stealth) or Blooded
# (a scout's honed senses) — both canonical Aiel background feats.
feat_options:
  - stealthy
  - blooded
# Pick-one equipment package (docs/wot/backgrounds.md Table 2-1): the desert
# traveller's kit (two healer's balms), a purse of jewelry, or an Aiel bow with
# a buckler.
items: []
equipment_packages:
  - [tent, cadinsor, buckler, waterskin, healers-balm, healers-balm]
  - [fine-jewelry]
  - [shortbow, arrow, buckler]
gold: 10
# Home + bonus languages (docs/wot/backgrounds.md Table 2-1; languages.md §3).
# Bonus languages are authored for fidelity; no creation step spends them yet.
home_language: common-aiel
bonus_languages: [aiel-handspeech, common-cairhien]
# Weapon restriction (docs/wot/backgrounds.md §Restrictions): the Aiel hold the
# sword in contempt and will not wield one. Enforced as an equip refusal on every
# sword weapon_category (the engine has no single "sword" kind — these are the
# sword categories; extend the list as new ones are authored). The Aiel use
# spears, bows, and knives, so daggers/bows are deliberately untouched.
weapon_restrictions: [longsword, short-sword, rapier]
weapon_restriction_message: |-
  Your hand will not close on it. The spear and the bow are the ways of the
  People; the sword is for wetlanders and the soft-handed. You set it aside.
allowed_categories:
  - humanoid
