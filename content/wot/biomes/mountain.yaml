# Mountain biome (biomes.md §2) — the Sand Hills below the Mountains of Mist.
# Outdoors and exposed; little grows to forage, but the broken ground exposes
# stone (a node wired in M2b). Rooms key in via `terrain: mountain`. No forage
# table — `forage` here reports "nothing to forage" (absence, not refusal).
id: mountain
name: rocky hills
description: Bare grey rock breaks through thin soil, and the wind has a colder edge.
ambience:
  - Wind moans thin and constant across the bare rock.
  - Scree shifts and clatters somewhere down the slope.
  - A hawk wheels high overhead, riding the cold updraft.
