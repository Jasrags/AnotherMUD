id: quarterstaff
name: a quarterstaff
type: weapon
description: |
  A stout length of ash as tall as a man, smooth-worn at the grips and shod with
  iron at both ends. A herder's walking staff and a Two Rivers lad's first weapon
  — held two-handed and swung in wide arcs, it keeps a closing foe at the end of
  its reach where a sword cannot yet answer.
tags: [weapon, wood, hafted]
keywords: [quarterstaff, staff]
# Two-handed haft (size-and-wielding §2): a LARGE weapon a medium wielder
# two-hands. It ties up the off hand.
size: large
eligible_slots: [wield]
weapon_damage: "1d6"
weapon_category: staff
proficiency_tier: simple
damage_types: [bludgeoning]
crit_multiplier: 2
# Special-weapons §3 — REACH. A reach weapon strikes at the `near` range band as
# well as melee: against a closing foe it lands the first blows while a sword
# wielder must still close to melee. `reach` is a numeric cross-ruleset stat (a
# Shadowrun staff is reach 2); WoT reads `reach > 0` = the near-band strike.
reach: 1
properties:
  weight: 4
  value: 20
