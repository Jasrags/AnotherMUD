id: quarterstaff
name: a quarterstaff
type: weapon
description: |
  A stout length of ash as tall as a man, smooth-worn at the grips and shod with
  iron at both ends. A herder's walking staff and a Two Rivers lad's first weapon
  — held two-handed and worked at both ends, a trained hand strikes with one tip
  and follows with the other in the same breath.
tags: [weapon, wood, hafted]
keywords: [quarterstaff, staff]
# Two-handed haft (size-and-wielding §2): a LARGE weapon a medium wielder
# two-hands. It ties up the off hand.
size: large
eligible_slots: [wield]
weapon_damage: "1d6"
weapon_category: staff
proficiency_tier: simple
damage_types: [bludgeoning]
crit_multiplier: 2
# Special-weapons §2 — DOUBLE WEAPON (equipment.md: quarterstaff 1d6/1d6). The
# second figure is the off-hand strike a double weapon grants when worked two-
# handed. RECORDED-ONLY: carried so the weapon is authored once; the extra strike
# lights up when double-weapon support (a two-weapon extension) reads it. Today it
# swings only its main 1d6.
double_damage: "1d6"
properties:
  weight: 4
  value: 10
