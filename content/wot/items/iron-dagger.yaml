id: iron-dagger
name: an iron dagger
type: item
description: |
  A cleanly forged iron dagger, straight and balanced, the edge drawn fine on a
  whetstone and the full tang running through a turned-oak grip. Plain work, but
  honest — the kind of blade a Two Rivers farmer keeps for skinning and worse.
tags: [weapon, metal, bladed]
keywords: [dagger, iron, knife]
eligible_slots: [wield]
properties:
  weight: 2
  value: 30
  # Masterwork via crafting (masterwork §7): a high-quality forge stamps a
  # quality grade on the dagger, so a finely-smithed one hits truer. The grade
  # is the highest tier at/below the rolled quality (mechanical, separate from
  # the cosmetic rarity the same roll stamps). A common forge leaves it plain.
  quality_grades:
    uncommon: masterwork
    rare: masterpiece
    epic: power-wrought
weapon_damage: "1d4"
modifiers:
  - stat: str
    value: 3
  - stat: hit_mod
    value: 4
