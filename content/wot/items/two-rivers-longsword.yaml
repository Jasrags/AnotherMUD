id: two-rivers-longsword
name: a Two Rivers longsword
type: weapon
description: |
  A plain, well-made longsword of the kind a Two Rivers smith turns out for a
  man bound for the wars beyond the Mountains of Mist — a straight double-edged
  blade as long as a leg, a hand-and-a-half grip wound in dark cord, and a
  crossguard worn bright by use. No heron mark, no boasting; just honest steel
  balanced to cut.
tags: [weapon, metal, bladed]
keywords: [longsword, sword, blade]
eligible_slots: [wield]
properties:
  weight: 4
  value: 150
weapon_damage: "1d8"
weapon_category: longsword
proficiency_tier: martial
damage_types: [slashing]
crit_threat_low: 19
crit_multiplier: 2
modifiers:
