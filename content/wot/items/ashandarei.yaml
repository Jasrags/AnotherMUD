id: ashandarei
name: an ashandarei
type: weapon
description: |
  A black-hafted polearm taller than a tall man, a slightly curved single-edged
  blade as long as a forearm set at its head and a steel butt-cap at its foot.
  The old symbols worked into the haft mean nothing to a Two Rivers eye, and the
  balance of the thing fights an untrained hand at every guard — a weapon made
  for a fighting form no armsman of the Westlands was ever taught.
tags: [weapon, metal, polearm]
keywords: [ashandarei, polearm, glaive, spear]
eligible_slots: [wield]
properties:
  weight: 12
  value: 600
weapon_damage: "1d6"
weapon_category: ashandarei
proficiency_tier: exotic
# Size-and-wielding §3: a polearm "taller than a tall man" is LARGE — one step
# above a medium wielder, so it is wielded TWO-HANDED (tying up the off hand,
# §4.1). The footprint is size-derived; the former static `companion_slots:
# [offhand]` is dropped — a larger (e.g. Ogier) wielder would one-hand it.
# Special-weapons §7 — DOUBLE weapon (the source's 1d6/1d8 ashandarei): the
# blade end strikes for the 1d6 primary and the butt-cap end for the 1d8
# double_damage off-hand, so it is used as TWO weapons (1× / ½× Strength + the
# two-weapon penalties), NOT as a single two-handed weapon (no 1.5× bonus).
size: large
damage_types: [slashing, bludgeoning]
crit_threat_low: 19
crit_multiplier: 2
double_damage: "1d8"
modifiers:
  - stat: str
    value: 6
  - stat: hit_mod
    value: 2
