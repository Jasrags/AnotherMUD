id: bandit
name: a road bandit
type: npc
behavior: stationary
tags: [humanoid]
keywords: [bandit, troublemaker, rogue]
# Experience for a lethal kill (grouping.md §4) — split among the killer's
# same-room party; a solo killer gets it all.
xp_value: 30
# The playtest combat target. Hostile to everyone, so walking into the
# meadow triggers mob.aggro → combat.Engage (the meadow is not a
# safe-room). Beatable with the starter short-sword + leather-cap.
disposition_rules:
  default: hostile
stats:
  hp_max: 24
  str: 11
# Equipment instantiated + equipped at spawn (mobs-ai-spawning §3.3): the
# dagger's modifiers buff the bandit, it rolls the dagger's 1d4 in combat
# (§4.5), and the instance is carried in the bandit's contents so it
# drops into the corpse on death like loot. Unqualified id → this pack.
equipment: [rusty-dagger]
# Drops loot + coins on death (M22) — reuses the guard loot table:
# a guaranteed ration, a weighted draught/cap, a rare short-sword, and
# a 2–8 coin purse. Exercises corpse / loot / autoloot / decay.
loot_table: guard-loot
