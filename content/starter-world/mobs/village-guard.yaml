id: village-guard
name: a village guard
type: npc
behavior: stationary
disposition: 0
tags: [humanoid, guard]
keywords: [guard, villager]
# Loot table rolled into the guard's contents at spawn (M22.1 —
# mobs-ai-spawning §6.3). Unqualified id resolves against this pack.
loot_table: guard-loot
# Equipment instantiated and "equipped" at spawn (mobs-ai-spawning §3.3).
# The sword's modifiers (str +4, hit_mod +3) are applied to the guard's
# stat block under a per-item source key, and the instance is carried in
# the guard's contents so it drops into the corpse on death like loot.
# Unqualified id resolves against this pack.
equipment: [short-sword]
stats:
  hp_max: 22
  str: 10
# Passive abilities (M9.5 #3 — abilities-and-effects §6). A trained
# guard occasionally lands a second swing. Unlike a player, the guard
# does not learn or train: this proficiency is fixed content. variance
# 80 ⇒ effective extra-swing chance is 50 × 80/100 = ~40% per round
# when the guard actually fights (an outlaw or evil-aligned attacker).
proficiencies:
  second-attack: 50
# Disposition policy (spec mobs-ai-spawning §5.1).
# Default reaction is friendly to everyone in the village.
# Players tagged `outlaw` (legacy explicit tag) and players whose
# alignment has crossed into the evil bucket (M8.5: alignment-
# driven) both draw aggro. Rule matching short-circuits on first
# hit, so an outlaw who is also evil only fires the outlaw rule
# (same reaction; order is documentation only).
disposition_rules:
  default: friendly
  rules:
    - has_tag: outlaw
      reaction: hostile
    - buckets: [evil]
      reaction: hostile
