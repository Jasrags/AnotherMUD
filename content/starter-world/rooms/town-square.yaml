id: town-square
area: town
name: Town Square
description: |
  Worn cobblestones spread out beneath your feet, polished smooth by
  generations of foot-traffic. A weathered notice board leans against
  the side of the well at the square's centre. Streets lead off to the
  north and east, and the south road runs out toward open country.
exits:
  north: forge
  east: market
  south: village-gate
items:
  - well
  # Starter gear: a fresh character can `get sword` / `get cap`, then
  # `equip sword` / `equip cap` to stand a chance against the gate-patrol
  # guard. Geared wins, ungeared loses.
  - short-sword
  - leather-cap
  # Demo of per-type damage resistance (armor-depth §4): unlike the leather
  # cap (which raises AC), the warded coif soaks slashing damage — wear it
  # and the road bandit's slashing dagger floors to 1 damage a hit.
  - warded-coif
  # Equipment-footprint playtest (inventory-equipment-items §3.3/§3.6):
  # `equip greatsword` fills BOTH hands (wield + offhand); then `equip
  # shield` displaces the two-hander, and `equip greatsword` again
  # displaces the shield — a live demo of spanning + slot contention.
  - iron-greatsword
  - wooden-shield
  # Ranged playtest (ranged-combat §3): a thrown weapon — `equip knife` then
  # `throw bandit` in the Meadow hurls it for one full-Strength swing; it lands
  # in the room afterward (recoverable), or shatters if it were graded.
  - throwing-knife
  # Special-weapons (S1 J) net/entangle demo: a weighted net. A fighter knows
  # `entangle` but it is NET-ONLY — `equip net`, go to the Meadow, `entangle
  # bandit` binds it (−4 to its attacks, −2 AC). Bare-handed entangle fizzles.
  - weighted-net
  # Subdual-damage (S1 J) knock-out demo: a sap (nonlethal) and a coiled whip
  # (nonlethal + reach). `get sap` / `equip sap`, fight the Meadow bandit, and
  # its finishing blow KNOCKS THE BANDIT OUT (unconscious, no corpse) instead of
  # slaying it (subdual-damage §4/§6).
  - sap
  - whip
  # M11.1: a pile of coins to exercise currency auto-convert — `get
  # coins` credits gold instead of adding an item to inventory.
  - gold-coins
  # M11.5: a trail ration to exercise the consume pipeline — `get
  # ration` then `eat ration` restores sustenance.
  - trail-ration
  # Playtest fixtures: a sack for container verbs (`get sack`, `put
  # sword in sack`, `look in sack`, `get sword from sack`) and a
  # waterskin to fill from the well (`get waterskin`, `fill waterskin`).
  - canvas-sack
  - waterskin
# M11.5 (economy-survival §5.7): the square is a gentle rest spot — a
# small additive regen bonus the vitals-regen heartbeat applies to
# anyone recovering here.
healing_rate: 1
# Cluster 2: the town square is a safe hub. `safe-room` blocks combat
# engagement here (combat §2.1); `safe` satisfies the training safe-room
# gate (progression §7.4) if a host enables RequireSafeRoomForStats.
# `auction_house` makes the square an auctioneer access point (auction-house
# §2): `auction <item> <price>`, `browse`, `buyout <#>`, `collect` work here.
tags: [safe-room, safe, auction_house]
# Most mobs spawn via area-level spawn_rules (spec mobs-ai-spawning §3.5; see
# areas/town.yaml). The recruiter is a fixed service NPC placed at boot (like the
# blacksmith / stablemaster) so `hire` always has an access point here from login
# (hireable-mobs.md §3.1).
mobs:
  - mercenary-captain
