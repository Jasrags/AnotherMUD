id: village-gate
area: wilderness
name: "{G}The Village Gate{x}"
description: |
  A low wooden gatehouse marks the line between Hearthwick and the
  open land beyond. The road back into the village runs north; ahead,
  a rutted track winds south into {g}long grass and distant trees{x}.
exits:
  north: town-square
  south: meadow
# Hob runs the gate stable (mounts.md): buy a mount here, stable it between
# journeys, and retrieve it before riding out south into the wilds.
mobs:
  - village-stablemaster
