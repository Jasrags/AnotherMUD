id: forest-edge
area: wilderness
name: "{g}The Forest's Edge{x}"
description: |
  The meadow grass gives way to the first trees here, saplings thickening
  into a proper wood to the east. A worn deer-path drops away south toward
  broken, rising ground. Back west, the long grass runs to the village.
exits:
  west: meadow
  east: deep-forest
  south: cave-mouth
terrain: forest
# A woodcutter's axe left leaning against a stump — the woodcutting-tool the
# timber stands here and deeper in require (gathering §3.3). Also sold by the
# blacksmith; left here so a new gatherer can start without a trip back.
items:
  - woodcutters-axe
  # Special-weapons (S1 J) trip + reach demo: a billhook (martial polearm). A
  # fighter knows the `trip` skill — `equip billhook`, then `trip <foe>` lands far
  # more reliably than a bare-handed trip (its trip_bonus raises the Reflex-save
  # DC). Its reach also strikes at the near band as a ranged foe closes.
  - billhook
  # Special-weapons (S1 J) disarm demo: a swordbreaker (disarm_bonus 3). A fighter
  # knows `disarm` — `equip swordbreaker`, then `disarm <foe>` afflicts it with the
  # `disarmed` condition (-4 to its attacks) far more reliably than bare-handed.
  - swordbreaker
