id: forge
area: town
name: "{Y}Hearthwick Forge{x}"
description: |
  Heat presses against your face the moment you cross the threshold.
  An anvil squats in the centre of the floor, surrounded by racks of
  half-finished hooks, hinges, and horseshoes. The {R}forge fire{x}
  pulses with each draw of the bellows.
exits:
  south: town-square
  down: forge-cellar
  west: forge-nook
# M15.1 doors: a plain (unlocked) oak door down to the cellar — the
# open/close test. Starts closed (door default), so `down` is blocked
# until you `open down`. Its reverse is declared on forge-cellar `up`.
doors:
  down:
    name: a sturdy oak door
    keywords: [oak, door]
# Hidden exits (hidden-exits §2): a secret alcove behind the western wall,
# unlisted and unwalkable until a character `search`es and beats the
# (deliberately easy) difficulty — the demo's "find the secret room". The
# reverse (forge-nook `east`) is authored NOT hidden.
hidden_exits:
  west:
    search_difficulty: 1
# M15.4: the forge is enclosed — shielded from weather and time
# ambience by default. No exposure flags so a rainstorm doesn't
# rain into the smithy.
terrain: indoors
# Light & darkness (§9): the forge fire keeps the smithy bright at all
# hours — an authored `lit` override pins it past the indoors ambient
# cap and the day/night cycle.
properties:
  light: lit
  # Crafting station (crafting-and-cooking §4): the forge is a Tier-2
  # smithing station. A craft reads this for the recipe's discipline to
  # gate the attempt + set the quality ceiling. reforge (station_tier 2)
  # can only be done here; quality reaches higher than any field attempt.
  craft_stations:
    smithing: 2
mobs:
  - blacksmith
