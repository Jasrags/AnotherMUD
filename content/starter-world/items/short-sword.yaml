id: short-sword
name: a short sword
type: item
description: |
  A plain soldier's short sword, its blade nicked from use but honed to a
  keen edge. The leather-wrapped grip is darkened with old sweat, and a
  simple crossguard shows the faint scoring of blows turned aside.
tags: [weapon, metal, bladed]
keywords: [sword, short]
# Equipment slot eligibility (inventory-equipment-items §3.3). A one-hand
# weapon: eligible for the wield slot, no companion (footprint = wield).
eligible_slots: [wield]
properties:
  weight: 3
  # Sale/craft value (economy §3, crafting §8). Worth more than the iron
  # ingot it is reforged from, so smithing it adds value (plan D2.1); the
  # greatsword reforged from it is worth more still.
  value: 18
# Weapon damage dice (combat §4.5). The wielder rolls this instead of the
# unarmed default; the rolled value is then scaled by STR. Validated at
# pack load and parsed to a dice expression on the instance.
weapon_damage: "1d6"
# Weapon category (weapon-identity §2): the opaque kind label per-weapon feats
# (Weapon Focus / Improved Critical, EPIC S4) match against — `feat weapon-focus
# sword` lifts to-hit while wielding this.
weapon_category: sword
# Starter weapon stats. On top of the damage die, combat reads STR
# (damage via the §4.5 STR bonus) and hit_mod (accuracy) from the
# wielder's stat block, so these modifiers make the sword meaningfully
# better than fighting unarmed.
modifiers:
  - stat: str
    value: 4
  - stat: hit_mod
    value: 3
