id: timber-log
name: a length of timber
type: item
description: |
  A rough-cut length of green timber, bark still on and ends raw from the
  axe. Heavy and damp, but it splits clean and burns well enough once a fire
  is going.
# Raw gathered material doubling as campfire fuel (crafting-and-cooking §4,
# §8). Cut from a timber stand (a woodcutting-tool node) in the forest. The
# `fuel` tag lets `build campfire` consume it, so a gatherer can raise a
# field fire without buying firewood from the cook — gathering replaces the
# vendor fuel stopgap. (A future woodworking discipline could refine this
# into planks; that tier is deferred — see the biomes/gathering plan.)
tags: [ingredient, wood, gathered, fuel, stackable]
keywords: [timber, log, wood, length]
properties:
  stackable: true
  weight: 4
  value: 2
