id: temperate
# Areas declaring `weather_zone: temperate` start at the initial state
# below before the first roll. Default if omitted is "clear".
initial_state: clear
# Roll every in-game hour. Default if omitted is 1.
roll_interval_hours: 1
# Weighted transition table: each entry under a state lists possible
# next-states and their weights. Weights must be > 0. A row whose
# entries all collapse to the current state acts as "stay".
transitions:
  clear:
    - next: clear
      weight: 6
    - next: cloudy
      weight: 4
  cloudy:
    - next: cloudy
      weight: 5
    - next: clear
      weight: 3
    - next: rain
      weight: 2
  rain:
    - next: rain
      weight: 4
    - next: cloudy
      weight: 4
    - next: clear
      weight: 2
# Per-state × per-terrain message tables. Absent entries fall through
# the cascade (room override → area override → zone[terrain] → empty).
# `outdoors` is the catch-all fallback per the zone cascade.
# Each line is wrapped in its state's theme tag (theme/theme.yaml:
# weather.* / time.*) so the ambience reads with a mood tint; the
# renderer strips the tags to plain text for no-color clients.
weather_messages:
  cloudy:
    outdoors:
      start: "<weather.cloudy>Clouds gather, dimming the light.</weather.cloudy>"
      ongoing: "<weather.cloudy>Grey clouds drift overhead.</weather.cloudy>"
      end: "<weather.cloudy>The clouds begin to thin.</weather.cloudy>"
  rain:
    outdoors:
      start: "<weather.rain>Rain begins to patter against the ground.</weather.rain>"
      ongoing: "<weather.rain>A steady rain falls around you.</weather.rain>"
      end: "<weather.rain>The rain tapers off and stops.</weather.rain>"
  clear:
    outdoors:
      start: "<weather.clear>The sky clears, and warmth returns to the air.</weather.clear>"
      ongoing: "<weather.clear>Clear skies stretch overhead.</weather.clear>"
      end: "<weather.clear>The horizon dulls as the air thickens.</weather.clear>"
# Time-of-day ambience for the four standard periods.
time_messages:
  dawn:
    outdoors: "<time.dawn>The first pale light leaks across the horizon.</time.dawn>"
  day:
    outdoors: "<time.day>Daylight settles in around you.</time.day>"
  dusk:
    outdoors: "<time.dusk>The sky deepens toward purple as evening draws in.</time.dusk>"
  night:
    outdoors: "<time.night>The land is wrapped in night, lit only by stars.</time.night>"
