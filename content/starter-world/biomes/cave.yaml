# Cave biome (biomes.md §2, §3) — the worked-out diggings under the
# foothills. Weather- AND time-shielded (it is underground: no sky, no
# day/night cycle — the §3 shielding flags, same as the engine `underground`
# baseline). Nothing grows to forage, but iron veins run through the rock (a
# mining-tool node yielding ore). Rooms key in via `terrain: cave`.
id: cave
name: dim cave
description: Cold stone closes overhead, and the air is still and mineral-damp.
weather_shielded: true
time_shielded: true
ambience:
  - Water drips, slow and echoing, somewhere back in the dark.
  - The air sits cold and dead, untouched by any wind.
  - Loose grit trickles from the ceiling and goes still.
node_spawn_table: cave-nodes
# Uneven footing in the dark: rougher than open ground (world-rooms-movement
# §3.3 cost gate; default is 1).
move_cost: 2
