id: puyallup-city
area: seattle-puyallup
name: "{y}Puyallup City{x}"
description: |
  The district's nominal centre, such as it is: a strip of permit-office
  storefronts and pawn shops run by officials who sell whatever the office is
  supposed to regulate. Rainier smokes on the southern horizon, ash grit crunches
  underfoot, and a <feature>fixer</feature> works the corner where the smuggling
  routes converge. The interstate runs back <exit>north</exit>; Tarislar's tents
  crowd <exit>east</exit>, Loveland's lights burn <exit>south</exit>, and the ash
  flats smoke away to the <exit>west</exit>.
terrain: barrens
exits:
  north: i5-south
  east: tarislar
  south: loveland
  west: the-ash-flat
# Contested but functional entry hub — no hostile spawn; a fixer deals here
# (smuggling-hub vendor). Not a safe-room: this is still the Barrens.
mobs:
  - fixer
