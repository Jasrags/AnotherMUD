id: ache-concourse
area: seattle-ache
name: "{C}ACHE — Ground Concourse{x}"
description: |
  The arcology swallows you whole: a ten-storey atrium of mirrored glass and
  hanging gardens, escalators threading up into the light, a <threat>Knight Errant security desk</threat>
  clocking every face against the SIN registry. The elevator
  bank waits along the north wall — brushed-steel doors under a floor indicator — and
  a fire-stair door beside it climbs <exit>up</exit>. Set into the floor, a welded
  <feature>blast door</feature> bears a faded Renraku sigil nobody has bothered to
  scrape off: the sealed sublevels, untouched since 2059. Fifth Avenue and the rain
  lie back out to the <exit>west</exit>. The elevator doors are set in the north wall
  — step <cmd>`north`</cmd> when they stand open, or <cmd>`call`</cmd> the car if
  it's away.
terrain: indoors
# Coord anchor for the seattle-ache stack. Once any room in an area is pinned
# (the elevator car is), the per-area auto-seed is disabled and every connected
# component needs its own pin (room-coordinates §4.3). Pin the ground concourse
# at the origin so the stack derives upward from here (up = +z).
coord:
  x: 0
  y: 0
  z: 0
# The elevator doorway ("elevator" -> car, "out" from the car) is bound here at
# boot by the transit service (default_stop 0). The `up` exit is the FIRE STAIRS —
# the slow, movement-metered path the elevator lets you skip (transit.md §7).
exits:
  west: fifth-avenue
  up: ache-commercial
tags: [safe-room, safe]
