id: fifth-avenue
area: seattle-downtown
name: "{C}Fifth Avenue{x}"
description: |
  Glass towers rise sheer on either side, close enough that the avenue feels
  like the bottom of a canyon carved from money. Corporate frontages gleam
  behind <feature>SIN-scanners</feature> and turnstile gates; a <threat>security drone</threat> hovers at the
  intersection, its lens tracking every face. The rain comes down grey between
  the spires. Westlake Plaza opens to the <exit>south</exit>, and the avenue climbs on <exit>north</exit>
  toward the walled corporate enclaves.
terrain: sprawl
exits:
  south: westlake-plaza
  # The arcology entrance off the avenue: the ACHE (former Renraku Arcology),
  # a self-contained vertical city with a working express elevator
  # (docs/specs/transit.md).
  east: ache-concourse
  # Stairs down to the Financial District platform of the Downtown Metro (the
  # scheduled subway line; docs/specs/transit.md §4.2).
  down: metro-financial
  # North into the walled corporate enclaves (the room's own prose): a SIN
  # checkpoint gates the turnstile — a `corporate` access license + a scan
  # (sin-and-legality.md §7.1). (Everett up the I-5 was the old stub for this
  # exit; deferred until that district is authored — the enclave uses it now.)
  north: corp-enclave-gate
# The Knight Errant beat cop who works the corporate core (neutral — she won't
# start it, but Downtown's fast AA response means she finishes it).
mobs:
  - knight-errant-officer
  # The licensed Ares Arms boutique on the corporate strip — the LEGIT tier of
  # the market (sin-and-legality.md §4): its counter scanner gates every sale on
  # a valid credential + the right permit, unlike the shadows' fixers.
  - ares-arms-clerk
