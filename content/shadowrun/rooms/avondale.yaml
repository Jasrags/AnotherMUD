id: avondale
area: seattle-redmond
name: "{r}Avondale{x}"
description: |
  Gang colours drown every wall — the Rusted Stilettos hold Avondale, and they
  want you to know it. Stripped cars burn at the kerb, ork silhouettes watch from
  the rooftops, and the air stinks of scorched plastic and cordite. This is the
  heart of the turf: Rebar holds court here, and nothing near him is friendly.
  The chop-shop and the only way out lie back to the south.
terrain: barrens
exits:
  south: stiletto-garage
# The Stiletto stronghold: Rebar (the boss) and his muscle hold it whether or not
# anyone is running a job here (static world flavour). Quest props are spawned in
# by the quests that need them and cleaned up after (quest-spawns.md), so the
# world isn't littered for players who aren't on the run.
mobs:
  - rusted-stiletto-boss
  - rusted-stiletto
