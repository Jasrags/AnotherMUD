id: westlake-plaza
area: seattle-downtown
name: "{C}Westlake Plaza{x}"
description: |
  Ferrocrete and polished granite open into the plaza at the centre of Downtown,
  ringed by arcologies whose logos turn slow against the drizzle. A dead
  <feature>fountain</feature> holds a skin of rainwater and cigarette ends, and
  <feature>grav-ads</feature> drift overhead murmuring corp slogans to no one.
  Office drones cut across in a hurry, eyes on their commlinks, and a
  <threat>Knight Errant patrol</threat> lingers at the north end — nobody runs
  open commerce under this much corporate glass. Real business happens off the
  plaza: up a <feature>stairwell</feature> off the alley your fixer keeps a flop,
  and the docs who cut chrome work the Barrens and the undercity, well out of the
  light. The corporate canyon of Fifth Avenue runs <exit>north</exit>, the neon
  of Pike Street glows <exit>south</exit>, historic Pioneer Square lies
  <exit>east</exit>, and the cold air off Elliott Bay drifts in from the
  <exit>west</exit>.
terrain: sprawl
exits:
  north: fifth-avenue
  south: pike-street
  east: pioneer-square
  west: elliott-bay-waterfront
  # Up a stairwell off the alley to the fixer's safehouse (the starter flop).
  up: the-flop
  # Down a service stair into the dead-lit maintenance sublevel — pitch black
  # (underground), where vision gear (thermographic / a light) earns its nuyen
  # (light-and-darkness §9; vision-modes). Source that gear first from a ripperdoc
  # (chrome-den) or a street doc (the-back-room) — it is no longer handed out here.
  down: downtown-substation
# A safe hub, like the seattle test corner and the demo town square: no combat,
# no spawns — a place to orient, read `score`, and pick a direction. `safe` also
# satisfies the training safe-room gate.
tags: [safe-room, safe]
# No starter drop. A fresh runner is fully kitted at character creation now
# (role×origin: the role-floor weapon + the origin's gear package + a universal
# commlink), so the old go-bag against the fountain is retired — the Plaza reads
# as a pure safe hub to orient in, not a free loadout. The real start room is the
# fixer's flop one `up` step away (make run-shadowrun → shadowrun:the-flop), where
# creation gear + Rook's first-entry commlink call land. Commerce still lives off
# the plaza: the `list`/`buy` Gun Table up at the flop, cyberware with the docs
# (chrome-den, the-back-room).
#
# NOTE: street-corner still carries the old open-vendor tray; it is the SR-M3c
# smoke-test harness (its live tests pin START_ROOM=street-corner directly), so
# it stays as-is until those tests migrate — then its tray can be retired too.
