id: westlake-plaza
area: seattle-downtown
name: "{C}Westlake Plaza{x}"
description: |
  Ferrocrete and polished granite open into the plaza at the centre of Downtown,
  ringed by arcologies whose logos turn slow against the drizzle. A dead fountain
  holds a skin of rainwater and cigarette ends, and grav-ads drift overhead
  murmuring corp slogans to no one. Office drones cut across in a hurry, eyes on
  their commlinks, and a Knight Errant patrol lingers at the north end — nobody
  runs open commerce under this much corporate glass. Real business happens off
  the plaza: up a stairwell off the alley your fixer keeps a flop, and the docs
  who cut chrome work the Barrens and the undercity, well out of the light. The
  corporate canyon of Fifth Avenue runs north, the neon of Pike Street glows
  south, historic Pioneer Square lies east, and the cold air off Elliott Bay
  drifts in from the west.
terrain: sprawl
exits:
  north: fifth-avenue
  south: pike-street
  east: pioneer-square
  west: elliott-bay-waterfront
  # Up a stairwell off the alley to the fixer's safehouse (the starter flop).
  up: the-flop
  # Down a service stair into the dead-lit maintenance sublevel — pitch black
  # (underground), where vision gear (thermographic / a light) earns its nuyen
  # (light-and-darkness §9; vision-modes). Source that gear first from a ripperdoc
  # (chrome-den) or a street doc (the-back-room) — it is no longer handed out here.
  down: downtown-substation
# A safe hub, like the seattle test corner and the demo town square: no combat,
# no spawns — a place to orient, read `score`, and pick a direction. `safe` also
# satisfies the training safe-room gate.
tags: [safe-room, safe]
# The starter drop. As the district's start room and safe hub, the Plaza is
# where a fresh runner — booted via `make run-shadowrun` — grabs a first loadout
# before heading out. A fixer left a go-bag stashed against the dead fountain:
# weapons + armor to `get`+`equip` for free (the demo conceit). Deliberately NOT
# a vendor and NOT chrome — open commerce and ripperdoc wares don't belong under
# Downtown's corporate/Knight-Errant surveillance. The `list`/`buy` shop lives
# one `up` step away at the fixer's flop (the-fixers-table / the Gun Table), and
# cyberware lives with the docs (chrome-den, the-back-room). This keeps the plaza
# reading as Downtown while the real business stays in the shadows where it fits.
#
# NOTE: street-corner still carries the old open-vendor tray; it is the SR-M3c
# smoke-test harness (its live tests pin START_ROOM=street-corner directly), so
# it stays as-is until those tests migrate — then its tray can be retired too.
items:
  # A katana + heavy pistol (with a clip) for the kill, a stun baton to take a
  # mark alive, an armoured jacket for the soak.
  - katana
  - ares-predator-v
  - predator-clip
  - caseless-round
  - stun-baton
  - armored-jacket
