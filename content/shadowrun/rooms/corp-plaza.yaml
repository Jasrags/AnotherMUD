id: corp-plaza
area: seattle
name: "{C}Corporate Plaza{x}"
description: |
  The sprawl falls away into a manicured plaza of mirrored glass and cold steel.
  A corporate arcology looms overhead, its logo turning slowly against the rain.
  <threat>Security drones</threat> drift on patrol, and a <threat>guard</threat> watches the entrance with the flat
  patience of someone paid to end trouble. Market Street lies back to the <exit>west</exit>.
terrain: sprawl
exits:
  west: market-street
# Corp-sec holds the plaza (neutral — returns fire if you start something).
mobs:
  - sec-guard
