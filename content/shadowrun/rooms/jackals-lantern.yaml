id: jackals-lantern
area: seattle-redmond
name: "{Y}Jackal's Lantern{x}"
description: |
  Behind a fence of barbed wire and a wall of a hundred guttering jack-o'-lanterns,
  Jackal's Lantern is the Halloweeners' clubhouse and throne room — a bar bolted
  into a gutted theatre lobby where it is always Halloween and always about to get
  worse. Trophies of past fires hang from the rafters; the jukebox plays screams;
  and Samhain holds court beneath a chandelier of pumpkins, the Blazer never far
  from his hand. Runners come here when they need the Halloweeners — and the ones
  who come uninvited become part of the decor. The strip is back west.
terrain: indoors
exits:
  west: redmond-hollywood
# Interior: shielded from weather + time, pinned lit so the clubhouse reads at any
# hour. NOT a safe-room — this is the gang's den; Samhain and his crew hold it.
properties:
  light: lit
mobs:
  - halloweener-boss
  - halloweener
