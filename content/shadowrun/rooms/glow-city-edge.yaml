id: glow-city-edge
area: seattle-redmond
name: "{G}The Edge of Glow City{x}"
description: |
  West of the strip the ferrocrete gives way to a dead zone that ticks on a
  Geiger counter — the Glow, southeastern Redmond's radioactive scar, where a
  reactor died and never stopped dying. Sickly luminescence bleeds off the
  rubble, and something mange-ridden and swollen watches from a drainage pipe.
  Touristville's lights are a relief back to the east.
terrain: barrens
exits:
  east: touristville
  # West descends into Glow City proper — the seattle-glow-city area on the
  # `toxic` biome (radiation hazard, area-effects §4.6, endgame 25+).
  west: glow-city
# A glow-mutated devil rat lairs at the Glow's edge (low threat, sets the tone).
mobs:
  - devil-rat
