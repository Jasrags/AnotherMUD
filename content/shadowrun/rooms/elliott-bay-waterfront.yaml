id: elliott-bay-waterfront
area: seattle-downtown
name: "{c}The Elliott Bay Waterfront{x}"
description: |
  The city gives way to grey water and greyer sky at the edge of Elliott Bay.
  Container cranes stand skeletal against the clouds, gulls wheel over the
  pilings, and the wharf smells of salt, diesel, and rotting kelp. A moored
  <feature>cargo barge</feature> creaks against its lines while dockworkers pretend not to watch
  who comes and goes — the waterfront runs on freight that never troubles a
  manifest. Westlake Plaza and the towers lie back to the <exit>east</exit>, and the wharf
  road runs <exit>south</exit> toward the SODO flats and the I-5 interchange.
terrain: sprawl
exits:
  east: westlake-plaza
  # South seam out of Downtown: the wharf road to the I-5 South interchange, and
  # on down the 5 to the Puyallup Barrens (seattle-puyallup).
  south: i5-south
  # Stairs down to the Waterfront Station platform of the Downtown Metro.
  down: metro-waterfront
# STUB: a north wharf walk and a smuggling-dock interior still belong here
# (industrial biome; the bay is a classic runner smuggling seam per the geography
# doc). Left unwired for now — extend the waterfront with its own rooms later.
