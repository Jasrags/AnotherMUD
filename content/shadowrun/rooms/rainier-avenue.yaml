id: rainier-avenue
area: seattle-renton
name: "{C}Rainier Avenue{x}"
description: |
  The district's spine runs dead straight between rows of corrugated warehouses
  and shuttered machine shops, their loading docks yawning onto a street rutted by
  freight haulers. Neon still burns in a few windows — a noodle stand, a pawnshop,
  a body shop with a hand-lettered sign — but half the frontages are boarded, and
  the drizzle beads on razor wire strung along every fence. A <threat>Humanis Policlub</threat>
  banner hangs from a lamppost to the <exit>north</exit>, HUMAN IS the message; the freight
  yards clatter away to the <exit>east</exit>; and <exit>south</exit> a warm smell of grease drifts
  up from Greasy Ben's. <exit>West</exit> the ramp climbs back toward the interstate.
terrain: industrial
exits:
  west: rainier-ave-ramp
  east: renton-freight-yards
  north: humanis-hall
  south: greasy-bens
