id: touristville
area: seattle-redmond
name: "{y}Touristville{x}"
description: |
  This close to the Bellevue wall the Barrens keep a thin veneer of order —
  Touristville, the runners call it, a C-zone strip of bars, chop shops, and
  cash-only clinics the gangs leave mostly alone because it's where they spend.
  Neon buzzes over puddled ferrocrete; a <feature>street doc</feature> works a clinic front under a
  flickering red cross. Bellevue Way and the 405 run <exit>south</exit> toward the enclave
  wall, the deeper Barrens open <exit>north</exit> into Sophocles, the Glow's sick light leaks
  in from the <exit>west</exit>, and Downfall's door glows <exit>east</exit>.
terrain: barrens
exits:
  south: bellevue-way
  north: sophocles
  west: glow-city-edge
  east: downfall
# The Barrens' safe haven: `safe-room` blocks combat, `safe` satisfies the
# training gate. A street doc runs the clinic — `list`/`buy` chrome and armour.
tags: [safe-room, safe]
mobs:
  - street-doc
