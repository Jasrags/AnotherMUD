id: downfall
area: seattle-redmond
name: "{Y}Downfall{x}"
description: |
  The only neutral ground in the Barrens worth the name: Downfall, a bar bolted
  together from shipping containers where runners, gangers, and worse drink under
  an unspoken truce. The bouncer is a troll with a shock-maul and no sense of
  humour; the drinks are cold and the ears are everywhere. A fixer holds a booth
  in the back. Touristville's strip is back through the door to the west.
# Interior: shielded from weather + time, and pinned lit so the bar reads at any
# hour (like Dante's / the Big Rhino).
terrain: indoors
exits:
  west: touristville
properties:
  light: lit
# Neutral shadow ground: safe hub with a fixer working the back booth.
tags: [safe-room, safe]
mobs:
  - fixer
