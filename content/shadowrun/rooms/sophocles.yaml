id: sophocles
area: seattle-redmond
name: "{c}Sophocles{x}"
description: |
  A neighbourhood that still remembers being one — barricades of stacked wrecks
  channel the street, and hand-lettered signs mark a community clinic and a soup
  line the locals defend themselves. It's the least wretched corner of the
  Barrens, which isn't saying much. Touristville's neon glows south; north the
  wrecks give way to the Rusted Stilettos' chop-shop and the Avondale turf beyond;
  and east, past a wall the locals keep barricaded, the scorched marquees of
  Hollywood burn — the Halloweeners' ghetto, and no one here goes that way by choice.
terrain: barrens
exits:
  south: touristville
  north: stiletto-garage
  east: redmond-hollywood
# Community-held: no gang spawn here. The threat is one street north.
