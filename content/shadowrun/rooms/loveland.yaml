id: loveland
area: seattle-puyallup
name: "{M}Loveland{x}"
description: |
  Puyallup's rough heart of neon and appetite — joygirls and joyboys work the
  doorways, BTL dens flicker behind blacked-out glass, and the whole strip runs
  on a functional, ugly economy that the gangs are smart enough not to burn down.
  A <feature>street doc</feature> keeps a stall between the pleasure dens, patching
  what the night costs. Puyallup City lies <exit>north</exit>; Hell's Kitchen's
  cook-smoke drifts in from the <exit>east</exit>.
terrain: barrens
exits:
  north: puyallup-city
  east: hells-kitchen
# Rough but functional: a relative haven with a street-doc vendor. Safe-room
# (the strip polices itself); `safe` also satisfies the training gate.
tags: [safe-room, safe]
mobs:
  - street-doc
