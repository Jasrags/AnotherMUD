id: street-corner
area: seattle
name: "{C}A Rain-Slick Street Corner{x}"
description: |
  Neon signage stutters in a dozen languages above a corner that never quite
  dries out. A noodle stand hisses steam into the drizzle; a defunct ATM wears
  a skin of gang tags. Foot traffic hurries past with their collars up and
  their eyes down. Beside the noodle stand a fixer in a long coat leans over a
  crate of wares, pricing your gear before you've said a word. An alley cuts
  north into the dark, and the street runs east toward the market stalls and the
  corp towers beyond.
terrain: sprawl
exits:
  north: back-alley
  east: market-street
# Starter gear on the corner (like the demo town square) so a fresh runner — or a
# smoke test — can gear up before walking east into the ganger's turf: a katana
# and a heavy pistol (with a clip) for the kill, a stun baton to take a mark
# alive, and an armoured jacket for the soak.
items:
  - katana
  - ares-predator-v
  - predator-clip
  - caseless-round
  - stun-baton
  - armored-jacket
  # A ripperdoc's sample tray — demo cyberware to `get` + `equip` into the
  # cyberware slot; each shifts an SR attribute on `score` (SR-M3c [98]).
  - wired-reflexes
  - muscle-replacement
  - cybereyes
# A street fixer works the safe corner — `list`/`buy` to spend looted nuyen on
# gear (SR-M3c [99]). Friendly, so she fits the safe-room (no combat). The
# STARTER-tier `street-fixer` (lean kit); the full black-market arsenal is at the
# deep hubs (see mobs/fixer.yaml).
mobs:
  - street-fixer
# A safe hub: no combat, no spawns — a place to stand, read `score`, gear up, and
# confirm the runner seeded correctly. `safe` also satisfies the training
# safe-room gate.
tags: [safe-room, safe]
