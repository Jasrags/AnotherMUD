id: hells-kitchen
area: seattle-puyallup
name: "{Y}Hell's Kitchen{x}"
description: |
  Against every expectation the food here is good — Hell's Kitchen, a warren of
  grill stalls and noodle counters where half the metroplex's cuisines steam
  under one patched roof, and rival gangers eat elbow to elbow because nobody
  fouls the best kitchen in the Barrens. Warmth, grease-smoke, and the clatter of
  woks fill the air. Loveland's neon is back through the west door.
# Interior: shielded from weather + time, pinned lit — a warm room at any hour.
terrain: indoors
exits:
  west: loveland
  # Down a ladder behind the stalls to Scalpel's chop-shop (the real ripperdoc).
  down: chrome-den
properties:
  light: lit
# A safe social hub and a gentle rest spot — the vitals-regen heartbeat gives a
# small bonus to anyone recovering here.
healing_rate: 1
