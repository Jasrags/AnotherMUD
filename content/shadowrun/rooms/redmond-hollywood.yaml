id: redmond-hollywood
area: seattle-redmond
name: "{r}Hollywood{x}"
description: |
  Redmond's entertainment ghetto rots under a sky the colour of a bruise: dead
  movie palaces with their marquees shot out, BTL parlors flickering behind
  boarded glass, and every third wall scorched black. This is Halloweener ground,
  and they have decorated it — jack-o'-lanterns leer from every ledge, effigies
  swing from the burnt-out streetlights, and the whole strip stinks of accelerant
  and old smoke. Sophocles and its fragile order lie back west; Jackal's Lantern
  burns orange to the east; and north an open lot glows with barrel-fires.
terrain: barrens
exits:
  west: sophocles
  east: jackals-lantern
  north: the-pumpkin-lot
# Sparkler, the gang's recruiter, works the strip looking for talent — the one
# approachable Halloweener (neutral), the way into the faction. The hostile crew
# hold the Pumpkin Lot (north) and Jackal's Lantern (east).
mobs:
  - halloweener-recruiter
