id: metro-waterfront
area: seattle-metro
name: "{c}Metro — Waterfront Station{x}"
description: |
  The end of the line: a damp platform where the tunnel air turns to salt and the
  tiles sweat with the bay above. A lone maintenance drone works a seized
  <feature>fare gate</feature>, and the <feature>transit board</feature> shows the
  train reversing here for the run back inland. Stairs climb <exit>up</exit> to the
  Elliott Bay waterfront. The train doors open to the north — step <cmd>`north`</cmd>
  to board when one's in.
terrain: indoors
