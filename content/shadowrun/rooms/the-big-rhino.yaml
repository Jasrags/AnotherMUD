id: the-big-rhino
area: seattle-downtown
name: "{Y}The Big Rhino{x}"
description: |
  The ceilings are high and the doorways higher — this is a bar built to troll
  scale, and proud of it. Scarred hardwood tables fill a warm, smoky room where
  orks, trolls, and the metahuman-friendly drink cheap and loud beneath a
  mounted <feature>rhino skull</feature>. The welcome here is real, which in Downtown makes it rare.
  A broad-shouldered <feature>bartender</feature> works the taps and misses nothing. The door lets
  back out to Pioneer Square, <exit>west</exit>.
terrain: indoors
exits:
  west: pioneer-square
properties:
  # A warm, well-lit bar — pinned lit so the interior stays readable past dark.
  light: lit
# A metahuman social hub: safe ground, no combat, no spawns.
tags: [safe-room, safe]
mobs:
  - ork-bartender
  # Kestrel holds the corner booth — the street-side fixer, the rival job source
  # to the corp Johnson at Dante's (quests/protection, quests/care-package).
  - kestrel
