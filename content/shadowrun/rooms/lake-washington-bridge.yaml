id: lake-washington-bridge
area: seattle-downtown
name: "{c}The I-90 Floating Bridge{x}"
description: |
  The interstate runs out across Lake Washington on pontoons, rain hammering the
  deck and grey chop slapping the concrete below. Behind you the downtown towers
  wall off the sky to the west; ahead, the Eastside's corporate lights smear the
  far shore, where Bellevue's towers wall off the enclave. The interstate runs on
  east into Factoria; beyond the corp core the 405 climbs north to the Redmond
  Barrens.
terrain: sprawl
exits:
  west: pike-street
  east: factoria
# Redmond is no longer reached directly from the bridge: with Bellevue authored,
# the geography is honest — east into the enclave (Factoria), then north up
# Bellevue Way / I-405 to the Redmond Barrens.
