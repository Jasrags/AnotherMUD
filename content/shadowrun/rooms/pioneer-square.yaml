id: pioneer-square
area: seattle-downtown
name: "{y}Pioneer Square{x}"
description: |
  Old Seattle survives here in soot-black brick and wrought iron, the only
  stone in Downtown that predates the corps. A <feature>pergola</feature> sags under
  a century of rain, and a rusted stairwell descends into the dark below the street,
  breathing up warm air and the distant sound of a crowd. Metahumans move easier in
  this quarter; the corp gloss thins east of the Plaza. Westlake Plaza lies
  <exit>west</exit>, the Big Rhino's sign burns orange to the <exit>east</exit>, and
  the stairs drop <exit>down</exit> into the Ork Underground.
terrain: sprawl
exits:
  west: westlake-plaza
  east: the-big-rhino
  down: underground-stair
# `down` seams into the Ork Underground (seattle-underground, biome underground,
# Z security) — the subterranean ork/troll city; the reverse `up` lives on
# underground-stair.
