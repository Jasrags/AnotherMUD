id: factoria
area: seattle-bellevue
name: "{c}Factoria{x}"
description: |
  Where the I-90 bridge lands on the Eastside the enclave keeps its rough edge:
  Factoria, a commercial fringe of big-box logistics and mid-tier office glass,
  the most accessible corner of Bellevue and the one place the wall lets working
  people through. <feature>SIN-scanners</feature> flank every doorway; a <threat>Knight Errant cruiser</threat> idles
  at the ramp. The bridge runs back <exit>west</exit> to the city; Bellevue's manicured core
  rises <exit>north</exit>.
terrain: corp-enclave
exits:
  west: lake-washington-bridge
  north: bellevue-square
