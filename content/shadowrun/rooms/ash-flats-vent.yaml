id: ash-flats-vent
area: seattle-ash-flats
name: "{K}The Vent Fields{x}"
description: |
  The deepest reach of the flats, where Rainier's breath comes straight up out of
  the ground: a field of fumaroles hissing yellow sulphur through the ash, the air
  a standing wall of poison. Shapes move in the haze that the smugglers swear are
  toxic spirits and won't discuss further. Whatever they are, they were here first.
  The only way back is east.
terrain: ashfall
exits:
  east: deep-ash-flats
# Terminal room — environmental threat only, the deep end of a sealed run.
