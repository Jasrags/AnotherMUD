id: underground-stair
area: seattle-underground
name: "{c}The Underground Stair{x}"
description: |
  The rusted stairwell from Pioneer Square switchbacks down through cold brick
  into warmth and noise — the temperature climbing with every step, the surface
  drizzle giving way to the close, lived-in air of the undercity. A hand-painted
  <feature>sign</feature> over the last landing reads WELCOME TO THE UNDERGROUND in three metatype
  scripts, and a pair of Skraacha lean against the wall below, watching who comes
  down without troubling anyone who behaves. The steps climb back <exit>up</exit> to the
  Square and daylight; below, the tunnel opens onto the market's glow and din.
terrain: underground
exits:
  up: pioneer-square
  down: underground-market
