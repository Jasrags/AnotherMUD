id: pike-street
area: seattle-downtown
name: "{M}Pike Street{x}"
description: |
  The strip comes alive after dark: holo-signage bleeds red and violet across
  the wet pavement, and the bass from a dozen clubs thuds up through your boots.
  Hawkers work the crowd with BTL chips and stimpatches, ganger colours mix with
  corp-kid slumming money, and the smell of soy-grilled skewers hangs in the
  rain. A <feature>doorway</feature> crowned in flickering hellfire neon marks the
  entrance to Dante's Inferno to the <exit>south</exit>; Westlake Plaza lies back to
  the <exit>north</exit>, and the strip runs <exit>east</exit> toward the I-90
  on-ramps and the bridge to the Eastside.
terrain: sprawl
exits:
  north: westlake-plaza
  south: dantes-inferno
  # East seam out of Downtown: the I-90 floating bridge to the Eastside, and
  # north off it to the Redmond Barrens (seattle-redmond).
  east: lake-washington-bridge
  # Stairs down to the Pike Station platform of the Downtown Metro.
  down: metro-pike
