id: downtown-substation
area: seattle-downtown-sublevel
name: "{c}The Maintenance Sublevel{x}"
description: |
  A low concrete service tunnel beneath the plaza, thick with the hum of transformers
  and the drip of condensation. The overhead strips died years ago and were never
  replaced — down here the dark is total, a black that swallows a hand held in front
  of your face. Cable runs and access panels line the walls, if you could see them.
  The service stair climbs back up toward Westlake's grey daylight.
# Underground (light-and-darkness §2.3): the ambient sky never reaches it, so it is
# pitch black — the one genuinely dark spot in Downtown, and the home for vision
# gear. A HUMAN (no racial dark vision) sees nothing here without a light or a
# see-in-the-dark mode (thermographic optics resolve it to gloom); a dwarf/troll
# reads it natively via their thermographic floor. Backed by vision_modes_live_test.go.
terrain: underground
exits:
  up: westlake-plaza
