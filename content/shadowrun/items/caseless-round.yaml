# SR-M3d — clip-vs-round resolved as per-shot round (Option A): each stackable
# unit is ONE caseless round, spent per shot via the ranged/ammo pipeline (the
# arrow model). The magazine model (a clip = N loaded rounds + a reload flow) is
# the deferred Option B. The id was `ammo-clip` (a legacy handle from the clip
# model); renamed to `caseless-round` so the id matches the display and a
# `spawn item caseless-round` reads as expected.
id: caseless-round
name: a caseless round
type: item
description: |
  A single caseless round — the standard feed for pistols and SMGs across the
  sprawl. Cheap and plentiful; a runner burns one per shot and carries a
  fistful, and they're gone faster than you'd think in a firefight.
tags: [ammo, ammunition, stackable]
keywords: [round, rounds, bullet, bullets, ammo, cartridge]
properties:
  stackable: true
  weight: 0 # a single round — negligible
  value: 3
# Ranged ammunition (ranged-combat §3): a firearm (ammo_kind "bullet") spends one
# round per shot. Out of ammo, the gun clicks empty.
ammo_kind: bullet
