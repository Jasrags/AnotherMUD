id: ballistic-weave
name: a ballistic weave insert
type: item
description: |
  A slab of layered aramid-and-ceramic weave cut to slot into an armor liner. It
  soaks bullets a little better at the cost of some of the garment's mod space.
tags: [armor-mod]
keywords: [weave, ballistic, insert, ballistic weave]
