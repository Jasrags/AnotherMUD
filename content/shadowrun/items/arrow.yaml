id: arrow
name: an arrow
type: item
description: |
  A carbon-shafted broadhead arrow, matte-black and fletched with synthetic vanes
  — no muzzle flash, no report, no shell casing for forensics to bag. The quiet
  runner's round: a bow leaves nothing behind but the body.
tags: [ammo, ammunition, stackable]
keywords: [arrow, shaft, broadhead]
properties:
  stackable: true
  weight: 1
  value: 2
