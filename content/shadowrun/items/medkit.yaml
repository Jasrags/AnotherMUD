id: medkit
name: a medkit
type: item
description: |
  A hard-shell field medkit — trauma sealant, stim ampoules, a sensor cuff, and
  a fold-out diagnostic screen. In trained hands it closes wounds a stimpatch can
  only paper over; the supplies run out, but the kit refills. The tool a runner's
  medic never leaves the doss without.
tags: [gear, medical]
keywords: [medkit, kit, med kit]
properties:
  weight: 2
  value: 750
  # The treat verb (healing-detailed.md — First Aid + Logic) requires this
  # flag and spends a charge of supplies per treatment. Reusable: an empty kit
  # is kept, not destroyed, and `refill` restocks it from a supply box.
  first_aid_kit: true
  # SR5 Rating (1-6): the standard mid-tier kit. Rating aids the First Aid
  # check and lifts the heal cap (treat verb).
  rating: 3
  charges: 10
  max_charges: 10
