id: chameleon-suit
name: a chameleon suit
type: item
description: |
  A form-fitting bodysuit sheathed in ruthenium polymer — a skin of programmable
  cells that drink in the surroundings and paint them back across you. Stand still
  and you all but vanish; move and you shimmer like heat off asphalt. Armor and
  invisibility cloak in one, prized by infiltrators who'd rather never be seen at all.
tags: [armor, wearable, medium]
keywords: [chameleon suit, chameleon, suit, ruthenium, armor]
eligible_slots: [body]
# SR5 Chameleon Suit (Core): rating 9, Capacity 9. MEDIUM tier. The ruthenium
