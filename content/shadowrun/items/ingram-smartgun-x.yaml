id: ingram-smartgun-x
name: an Ingram Smartgun X
type: weapon
description: |
  A submachine gun built around an integral smartgun system — muzzle sensor, recoil
  compensation, and a targeting feed baked into the frame. Pair it with a smartlink
  and the burst goes exactly where you're looking; run it blind and it's still a
  solid bullet hose.
# `smartgun` is an INTRINSIC capability tag (not a bolt-on accessory): the internal
