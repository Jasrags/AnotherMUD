id: foregrip
name: a tactical foregrip
type: item
description: |
  A moulded vertical grip that bolts to the under-barrel rail, giving the support
  hand real leverage against muzzle climb. Keeps the sights on target through a
  hurried string. Standard kit on any weapon meant to be run hard.
tags: [weapon-accessory]
keywords: [foregrip, grip, fore-grip, vertical grip]
# Weapon accessory: UNDER-BARREL mount. Steadies the weapon for a small to-hit
# bonus (equip modifier path). Distinct mount from the top optics, so a shooter
# can pair a foregrip with a reflex/scope for a two-mount investment.
mod_host: weapon
accessory_mounts: [under-barrel]
modifiers:
  - stat: hit_mod
    value: 1
properties:
  weight: 1
  value: 200
