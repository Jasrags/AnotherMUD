id: riot-shield
name: a riot shield
type: item
description: |
  A tall transparent polycarbonate shield, the kind Lone Star lines up behind when
  a protest turns ugly. Lighter than a ballistic slab and built to shove and absorb
  rather than stop a rifle, but strapped to the off arm it still turns a beating
  into a bad afternoon.
