name: shadowrun
version: "0.1.0"
# A world pack (character-identity §2): a leaf ruleset a character is stamped to
# and locked to (the tapestry-core baseline is a library). SR-M3c-1 (the "Boots"
# slice — docs/themes/shadowrun-mvp.md): the minimal bootable sixth-world pack —
# a human metatype with the eight Shadowrun primaries + Edge, a Stun condition
# monitor, the soak/defense channel map, and one small district to stand in.
kind: world
description: |
  The Shadowrun world pack — the Sixth World, where magic returned and the
  megacorps own everything worth owning. Original prose set in the Shadowrun
  setting (a non-commercial fan project); it uses the setting's concepts and
  vocabulary, never reproduced published text.

  Depends on the tapestry-core engine baseline (slots, abilities, effects,
  channels, emotes, rarity). Boot it with:
    ANOTHERMUD_PACKS=shadowrun ANOTHERMUD_START_ROOM=shadowrun:street-corner

  SR-M3c-1: a single street corner in the Seattle sprawl — enough to create a
  runner, read the score sheet, and confirm the Stun monitor seeds from
  Willpower. Metatypes, skills, weapons, the Street Samurai, and the district
  land in SR-M3c-2/3.
dependencies:
  tapestry-core: "*"
# Connect splash (required for kind:world) — the door identity shown before the
# account prompt. Plain text with engine color markup ({Y}…{x}).
splash: splash.txt
# Select the world's base attribute set: the eight Shadowrun primaries + Edge
# instead of the classic six (SR-M1). The set itself is declared under the
# attribute_sets content glob below; this scalar picks it for a shadowrun boot.
attribute_set: shadowrun-primaries
# Money display (currency-label seam): the Sixth World runs on nuyen, shown with
# the ¥ mark as a suffix (725¥) per the SR canon tables. Display-only — the
# ledger is the same integer balance every world uses; this just reskins how it
# prints (score purse, shop prices, the `gold` verb, trade/auction). Physical
# cash doesn't exist (nuyen is electronic, carried on credsticks), so the
# loose-coin drop paths stay gold-only and SR simply doesn't use them.
currency:
  name: nuyen
  suffix: "¥"
# Stealth-skill selection (skills §2): SR5 merges D&D's Hide + Move Silently into
# one AGI skill, Sneaking. This routes BOTH concealment axes (the `hide` and
# `sneak` verbs' checks AND their use-gain) through the single `sneaking` skill,
# so a runner has one Stealth skill instead of the two-axis fantasy default.
stealth_skill: sneaking
content:
  # The eight primaries (Body/Agility/Reaction/Strength/Willpower/Logic/
  # Intuition/Charisma) plus Edge (SR-M1). The loader enumerates by this glob,
  # NOT directory convention.
  attribute_sets:
    - attributes/*.yaml
  # The Stun condition monitor (SR-M3a) — a nonlethal, willpower-derived pool
  # that routes subdual damage to a knock-out. The Physical monitor is the hp/
  # Vitals track (Design 1), seeded flat by the engine, so no pool is declared
  # for it here.
  pools:
    - pools/*.yaml
  # Shadowrun folds armour into a soak (mitigation) and derives defense from
  # Reaction + Intuition — it overrides ALL FOUR combat channels because the
  # core baseline reads attributes (hit_mod/ac/str) this world does not use.
  channel_map:
    - channel-map/*.yaml
  # Metatypes (the playable peoples). SR-M3c-1 shipped Human; elf/dwarf/ork/troll
  # land in SR-M3c-2.
  races:
    - metatypes/*.yaml
  # The advancement track every SR class binds to (world-locked: SR progression
  # stays inside the SR world, never a library-pack track) + the playable
  # classes (SR-M3c-3: the Street Samurai) and backgrounds.
  tracks:
    - tracks/*.yaml
  classes:
    - classes/*.yaml
  backgrounds:
    - backgrounds/*.yaml
  # The SR active-skill roster (sr-skills-plan.md; engine = skills.md §2.1/§5):
  # skill abilities carrying linked_attribute / skill_group / skill_category so
  # the `skills` listing renders grouped SR-style. open-lock + perception here
  # override the core abilities (priority 1) to reskin them as Locksmith /
  # SR Perception; the rest are new. Depends on core (skills inherit its shape).
  abilities:
    - abilities/*.yaml
  # Weapons, armour, and ammo (SR-M3c-2): firearms + katana + the stun baton
  # (target_pool: stun) and armour that feeds the Shadowrun soak.
  # The cyberware slot (SR-M3c [98]) — installed augmentations, distinct from
  # worn gear. Must load before item validation resolves eligible_slots.
  slots:
    - slots/*.yaml
  # Ammunition quality grades (grade-through-holder, ammo-and-reloading §8) —
  # must load before items so a graded round resolves its grade.
  grades:
    - grades/*.yaml
  items:
    - items/*.yaml
  # Pack-declared property keys (loaded before areas/rooms so their
  # `properties:` bags can reference them). `security` — the SR zone tier — lives
  # here rather than in the engine baseline, keeping the engine setting-agnostic.
  properties:
    - properties/*.yaml
  areas:
    - areas/*.yaml
  rooms:
    - rooms/*.yaml
  # The urban biome (terrain: sprawl → ambience + easy paved movement) and the
  # sprawl's perpetual-rain weather zone. The area's `light_floor: dim` (not a
  # biome/weather concern) is what keeps the streets navigable after dark.
  biomes:
    - biomes/*.yaml
  weather_zones:
    - weather_zones/*.yaml
  # The district population (SR-M3c-3): a hostile ganger + a corp-sec guard,
  # each with SR combat stats + gear, dropping nuyen on death.
  mobs:
    - mobs/*.yaml
  loot_tables:
    - loot_tables/*.yaml
  # Crafting recipes (crafting-and-cooking.md). The Armorer skill's bench work —
  # handloading ammunition and the like. Loaded after items so recipe input/
  # output templates resolve.
  recipes:
    - recipes/*.yaml
  # Factions (faction.md) — the corp-vs-street axis the fixer rivalry runs on.
  # Loaded before quests so quest reward/prereq faction refs resolve.
  factions:
    - factions/*.yaml
  # Quests (quests.md). Loaded after mobs/rooms/items so their giver,
  # objective targets, and reward item ids resolve against already-registered
  # world content. "Flanagan's Own" — Brian's dream-bar arc — lives here.
  quests:
    - quests/*.yaml
