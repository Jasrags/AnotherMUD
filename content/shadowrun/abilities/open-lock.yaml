# Locksmith — SR active skill (sr-skills-plan.md; engine skills.md §2.1).
# Overrides the core ability of the same id (priority 1) to reskin it for SR.
id: open-lock
name: Locksmith
type: passive
category: skill
default_cap: 30
gain_base_chance: 30
gain_failure_multiplier: 0.5
gain_stat: agility
gain_stat_scale: 0.1
skill_category: technical
# Trained-only (skills §2.1): Locksmith can't be defaulted — the `pick` verb
# refuses an untrained runner (SkillDefaulting reads this field). Must be set on
# the override too: a priority-1 override replaces the core ability by id, so it
# does not inherit core Open Lock's trained_only.
trained_only: true
priority: 1
