id: fixer
name: a black-market fixer
type: npc
behavior: stationary
description: |
  A rangy woman in a long coat leans against the wall behind a crate of wares,
  eyes flicking to your gear and pricing it before you've said a word. She deals
  in whatever a runner needs — from a spare clip to a milspec rifle to the chrome
  under your skin — and never asks what it's for. Nuyen up front, no receipts.
  `list` to see her stock, `buy <item>` to deal.
tags: [humanoid, shop, fixer]
keywords: [fixer, dealer, shopkeeper, woman, black-market]
# A fixer, not a mark — friendly to everyone; nobody robs the person who sells
# them ammo.
disposition_rules:
  default: friendly
stats:
  hp_max: 20
  body: 3
  willpower: 3
# The VETERAN / black-market tier (placement-audit catalog tiering, 2026-07-16):
# the full arsenal — heavy weapons, exotics (flamethrower/cryo), the whole armor
# range + shields, and the deep cyberware/eyeware mods. Placed at the deep hubs
# where it fits the fiction: the undercity black market (underground-market), the
# neutral barrens bar (downfall), and the smuggling hub (puyallup-city). The lean
# STARTER kit — refills, entry sidearms, basic armor, the smartlink path — is the
# sibling `street-fixer`, at the start rooms + the rookie gun-table, so a fresh
# runner's first fixer isn't a walking arsenal.
#
# Shop config (economy-survival §3.1). `sells` lists item template ids on offer;
# the shop block is an arbitrary property map, so ids are NOT namespace-rewritten
# — qualify them explicitly (shadowrun:<id>). buy_markup/sell_discount fall
# through to the global 1.2 / 0.5 defaults. A fresh runner's 500 nuyen (street-
# kid) covers the clip and the pistol; the jacket and chrome are a payday away.
properties:
  shop:
    # A full-service fixer / black-market fence: takes weapons, ammo, armor,
    # chrome, the mods that fit them, and general loot (tradegoods, contraband,
    # salvage) off a runner's hands (economy-survival §3.6a).
    buys: [weapon, ammo, armor, cyberware, weapon-accessory, armor-mod, cyberware-mod, tradegood, contraband, component]
    sells:
      # Ammo SKUs (ammo-and-reloading §6): a pre-loaded clip (the primary buy),
      # loose rounds (refills), and an empty clip (a cheap spare to fill).
      - shadowrun:predator-clip-loaded
      - shadowrun:caseless-round
      - shadowrun:apds-round
      - shadowrun:predator-clip
      - shadowrun:ares-predator-v
      # Core firearms line (WEAPONS reference) — pistols → machine pistol → SMG →
      # assault rifle → sniper → shotgun → LMG. All fire loose `bullet` ammo
      # (caseless-round / apds). The Ingram has an internal smartgun (pairs with a
      # smartlink); the Defiance EX Shocker is a ranged stun weapon (taser darts).
      - shadowrun:streetline-special
      - shadowrun:ares-light-fire-70
      - shadowrun:browning-ultra-power
      - shadowrun:ruger-super-warhawk
      - shadowrun:ceska-black-scorpion
      - shadowrun:hk-227
      - shadowrun:ingram-smartgun-x
      - shadowrun:ak-97
      - shadowrun:ares-alpha
      - shadowrun:ranger-arms-sm-5
      - shadowrun:defiance-t-250
      - shadowrun:ingram-valiant
      - shadowrun:defiance-ex-shocker
      - shadowrun:taser-dart
      # Flamethrower (fire damage) — burns through the unprotected; feeds fuel
      # canisters. Counter it with a fire-resistance liner (armor mod, below).
      - shadowrun:shiawase-arms-blazer
      - shadowrun:fuel-canister
      # Cryo projector (cold damage) — the flamethrower's cold twin; feeds coolant.
      # An insulation liner soaks it; a thermal suit seals the deep freeze out.
      - shadowrun:cryo-projector
      - shadowrun:coolant-canister
      - shadowrun:coldsuit
      # Melee — silent, deniable, scanner-proof.
      - shadowrun:combat-knife
      - shadowrun:sword
      - shadowrun:combat-axe
      - shadowrun:extendable-baton
      # Ballistic projectiles (WEAPONS.md) — silent, deniable, no powder
      # signature. A bow feeds loose arrows; crossbows chamber a bolt via `load`.
      - shadowrun:bow
      - shadowrun:arrow
      - shadowrun:light-crossbow
      - shadowrun:medium-crossbow
      - shadowrun:heavy-crossbow
      - shadowrun:bolt
      - shadowrun:armored-jacket
      - shadowrun:armor-vest
      # Core armor line (WEAPONS/ARMOR reference) — body armor by tier, plus a
      # helmet and off-hand shields. All feed the `mitigation: body + armor` soak.
      - shadowrun:armor-clothing
      - shadowrun:actioneer-business-clothes
      - shadowrun:lined-coat
      - shadowrun:urban-explorer-jumpsuit
      - shadowrun:chameleon-suit
      - shadowrun:full-body-armor
      - shadowrun:helmet
      - shadowrun:ballistic-shield
      - shadowrun:riot-shield
      - shadowrun:cybereyes
      # Armor modifications (item-modification.md) — slot these into a modifiable
      # jacket/vest with `modify <armor> <mod>`. Physical soak, environmental
      # resistance, or a full seal, traded against the garment's capacity.
      - shadowrun:ballistic-weave
      - shadowrun:chemical-protection
      - shadowrun:radiation-shielding
      - shadowrun:fire-resistance
      - shadowrun:insulation
      - shadowrun:nonconductivity
      - shadowrun:chemical-seal
      # Weapon accessory (weapon-accessories.md) — `modify <weapon> laser`.
      - shadowrun:laser-sight
      # Cyberware-cluster enhancement (item-modification.md) — `modify cybereyes
      # vision` slots it into a cybereye's capacity before you install the eyes.
      - shadowrun:cybereye-vision-enhancement
      # Vision-mode cybereye mods (light-and-darkness §4) — thermographic sees by
      # heat in total dark; low-light amplifies faint light. `modify cybereyes
      # thermographic` / `... low-light`, then wear the eyes.
      - shadowrun:cybereye-thermographic
      - shadowrun:cybereye-low-light
      # Ultrasound sensor (visibility §3/§4.3) — active sonar that pierces
      # darkness AND detects hidden/sneaking foes, regardless of light.
      - shadowrun:cybereye-ultrasound
      # Vision magnification (ranged-combat §5.3) — telescopic optics that cut the
      # range-band to-hit falloff on a projectile shot (treats the target closer).
      - shadowrun:cybereye-magnification
      # Non-cyber eyewear (the `eyes` slot) — low-light vision with no surgery or
      # Essence, for a runner who hasn't gone under the knife.
      - shadowrun:low-light-goggles
      # Smartlink↔smartgun pairing: a smartlink drops into a cybereye, a smartgun
      # system onto a weapon's mount; carrying both grants the to-hit bonus.
      - shadowrun:smartlink
      - shadowrun:smartgun-system
      # Fake SINs (sin-and-legality.md §3) — forged citizen identities that let a
      # runner walk into a legit store and clear its scanner. The basic (rating 2)
      # carries a firearms license; the premium (rating 4) adds cyberware and
      # holds up to harder scrutiny. A payday's investment that opens the legal
      # market — `licenses` (or `sin`) shows what papers you're holding.
      - shadowrun:fake-sin-basic
      - shadowrun:fake-sin-premium
