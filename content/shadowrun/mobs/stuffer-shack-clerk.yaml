id: stuffer-shack-clerk
name: a Stuffer Shack clerk
type: npc
behavior: stationary
description: |
  A bored wageslave in an Aztechnology-orange Stuffer Shack tabard works the
  counter of the sprawl's most inevitable franchise: soykaf and soydogs under a
  heat lamp, a wall of NutriSoy in forty flavors, the same forty in every Shack
  on Earth — legal, cheap, and open around the clock. The register never closes,
  and by the look of him neither does his shift.
tags: [humanoid, shop, civilian]
keywords: [clerk, wageslave, stuffer, shack, cashier]
# A retail service NPC — friendly to everyone.
disposition_rules:
  default: friendly
stats:
  hp_max: 18
  body: 2
  willpower: 2
# Over-the-counter convenience stock (economy-survival §3.1): soy food + drink,
# the legal front-of-house menu. The illicit product moves in the back kitchen,
# off the register (see stuffer-shack-cook). Ids qualified shadowrun:<id>.
properties:
  shop:
    sells:
      - shadowrun:soydog
      - shadowrun:nutrisoy-chips
      - shadowrun:soykaf
      - shadowrun:synthahol
      - shadowrun:stimpatch
