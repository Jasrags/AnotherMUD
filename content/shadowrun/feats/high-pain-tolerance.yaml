id: high-pain-tolerance
name: High Pain Tolerance
description: You shrug off wounds that would drop others — you gain +3 maximum hit points each time you take this.
karma_cost: 7
multi_take: stackable
grants:
  - { kind: max_hp, magnitude: 3 }
