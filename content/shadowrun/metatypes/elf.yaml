# Elf — the graceful metatype, all agility and presence. A metatype's identity is
# its starting-attribute skew (stat_bonuses, applied once at creation) plus its
# per-attribute ceiling (stat_caps, how high training/augmentation can push it),
# its size, and its vision. The elf begins with higher Agility and Charisma AND
# trains them higher (SR5 min→bonus, max→cap).
id: elf
name: Elf
tagline: Quick, comely, and quietly certain of it.
description: |
  Elves came back with the Awakening looking like the stories — tall, sharp of
  ear, unfairly graceful — and the sprawl has resented them for it ever since.
  They make natural faces and shooters, low-light eyes turning a dark alley into
  dusk, though corp boardrooms and street gangs alike keep a wary distance.
category: humanoid
starting_alignment: 0
stat_caps:
  body: 6
  agility: 7
  reaction: 6
  strength: 6
  willpower: 6
  logic: 6
  intuition: 6
  charisma: 8
  edge: 6
# Starting skew (SR5 elf: Agility min 2, Charisma min 3 → +1/+2 over the human
# baseline of 1). Applied once at creation on top of the attribute-set seed.
stat_bonuses:
  agility: 1
  charisma: 2
cast_cost_modifier: 0
racial_flags:
  - common-tongue
priority: 1
