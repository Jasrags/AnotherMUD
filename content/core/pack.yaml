name: tapestry-core
version: "0.1.0"
# A library pack (character-identity §2): the shared baseline worlds depend
# on. Characters are never stamped to a library — only to a world pack.
kind: library
description: |
  Engine-scope baseline pack — the mechanical content every world depends on:
  races, classes, tracks, equipment slots, effects, abilities, the item
  decoration vocabularies (rarity/essence), the color theme, and command help.

  It carries NO world geography (no areas/rooms/mobs/quests). A world pack
  (the demo `starter-world`, or a setting like `wot`) depends on this baseline
  and supplies its own places, people, and things. `tapestry-core` is the
  engine namespace (a placeholder string, not a setting) — see docs/PRIMER.md.
content:
  slots:
    - slots/*.yaml
  # Base attribute set (SR-M1 — shadowrun-mvp.md Appendix A). The engine
  # `classic` six; a world seeds characters + the score sheet + the train
  # gate from the set it selects. Declaring it here is the regression gate —
  # `classic` reproduces DefaultPlayerBase's six + DefaultTrainingConfig's
  # trainable set exactly, so making the seed data-driven is a no-op for the
  # existing worlds.
  attribute_sets:
    - attributes/*.yaml
  # Resource pools (shadowrun-mvp SR-M3a). The engine mana/movement pools,
  # declared as content — the regression gate: these reproduce the hardcoded
  # seedResourcePools binds exactly (kind, floor 0, the resource_max/movement_max
  # ceiling channel, player-only seeding), so making the seed data-driven is a
  # no-op for the existing worlds. A world pack (Shadowrun) declares its own
  # monitors (Stun/Physical) with their own rules.
  pools:
    - pools/*.yaml
  tracks:
    - tracks/*.yaml
  races:
    - races/*.yaml
  classes:
    - classes/*.yaml
  backgrounds:
    - backgrounds/*.yaml
  feats:
    - feats/*.yaml
  abilities:
    - abilities/*.yaml
  effects:
    - effects/*.yaml
  rarity:
    - rarity/*.yaml
  essence:
    - essence/*.yaml
  theme:
    - theme/*.yaml
  help:
    - help/*.yaml
  channels:
    - channels/*.yaml
  emotes:
    - emotes/*.yaml
  ranged_flavor:
    - ranged_flavor/*.yaml
  channel_map:
    - channel-map/*.yaml
