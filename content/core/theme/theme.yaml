# tapestry-core default theme (ui-rendering-help §3.1).
#
# Maps semantic tag names emitted by the engine to terminal colors.
# fg/bg are color names (§2.3): the 8 standard colors plus bright
# variants (bright-red, dark-gray, …). html is optional and only used
# by GMCP clients. Tag names are global; a downstream pack can override
# any of these by registering the same tag.
tags:
  # Vital pools — used by the prompt template and score/status output.
  hp:    { fg: green,  html: "#33CC33" }
  mana:  { fg: blue,   html: "#3366FF" }
  mv:    { fg: yellow, html: "#CCCC33" }

  # Coin / currency amounts — the score sheet's purse, shop prices.
  gold:  { fg: yellow, html: "#E0C56A" }

  # General emphasis.
  highlight: { fg: bright-white,  html: "#FFFFFF" }
  subtle:    { fg: dark-gray,     html: "#888888" }
  title:     { fg: bright-cyan,   html: "#33FFFF" }
  good:      { fg: bright-green,  html: "#33FF33" }
  warning:   { fg: bright-yellow, html: "#FFFF33" }
  danger:    { fg: bright-red,    html: "#FF3333" }

  # Combat feedback (M9.6 damage/heal numbers become visible once
  # combat output is rendered through these tags).
  damage: { fg: red,        html: "#CC3333" }
  heal:   { fg: green,      html: "#33CC66" }

  # Structural framing used by the panel renderer (M10.4).
  frame: { fg: dark-gray, html: "#666666" }

  # Item rarity tiers.
  item.common:    { fg: white }
  item.uncommon:  { fg: green,        html: "#33CC33" }
  item.rare:      { fg: bright-blue,  html: "#3399FF" }
  item.legendary: { fg: bright-magenta, html: "#FF66FF" }

  # Room rendering — exits (RenderRoom). The room name reuses <title>;
  # closed doors reuse <warning>, locked doors <danger>.
  exit: { fg: cyan, html: "#33CCCC" }

  # Room rendering — "You see here:" entities. Other players and
  # neutral mobs; placed items reuse the item.* rarity tags above.
  present.player:  { fg: bright-white, html: "#FFFFFF" }
  present.mob:     { fg: yellow,       html: "#CCCC33" }
  present.hostile: { fg: bright-red,   html: "#FF3333" }

  # Weather ambience — one tint per weather state, applied to the whole
  # start/ongoing/end line so it reads as mood (content/weather_zones).
  # Muted on purpose: a full-line tint should set atmosphere, not shout.
  weather.clear:   { fg: yellow,    html: "#E0C56A" }
  weather.cloudy:  { fg: dark-gray, html: "#9AA0A6" }
  weather.rain:    { fg: blue,      html: "#7FA8C9" }

  # Time-of-day ambience — one tint per period (content/weather_zones).
  time.dawn:  { fg: yellow,         html: "#E8B98A" }
  time.day:   { fg: bright-yellow,  html: "#F2E39A" }
  time.dusk:  { fg: magenta,        html: "#B98AD9" }
  time.night: { fg: blue,           html: "#6A78C9" }
