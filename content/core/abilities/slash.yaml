id: slash
name: Slash
type: active
category: skill

# Default learn cap for fresh learners; trainers (Maerys et al.) raise
# this via the practice path (spec progression.md §7.5).
default_cap: 25

# 25% base gain chance on use, halved on miss.
gain_base_chance: 25
gain_failure_multiplier: 0.5

# DEX contributes to gain-roll probability (spec
# abilities-and-effects §3.5 step 3).
gain_stat: dex
gain_stat_scale: 0.1

# M9.3 validation surface: slash is a wield-locked melee skill.
# Cost draws from movement (spec §4.7 skills→movement). Pulse delay
# enforces a small cooldown so spam-queueing surfaces as fizzles.
cost: 5
pulse_delay: 1
equipment_slot: wield
equipment_tag: blade
target_types:
  - enemy
