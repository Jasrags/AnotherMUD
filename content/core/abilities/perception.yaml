# The Perception skill (skills §2 — EPIC S3; visibility §4.2). A use-based
# proficiency (NOT a combat ability) that COLLAPSES the d20 Spot / Listen /
# Search trio onto the engine's single perception surface (skills.md
# collapse decision). It feeds the observer's PerceptionBonus in the perception
# contest — a trained observer pierces hide/sneak concealment more often — and
# the active `search` for hidden exits. Improves through use every time you
# `search`.
#
# Untrained use is allowed — Perception is DEFAULTABLE (skills §2.1), not
# trained-only: anyone can try to notice things. An untrained perceiver (no
# proficiency) resolves at the bare Wisdom modifier MINUS the default_penalty
# below; training removes that penalty and adds the proficiency bonus. NOTE: the
# string "perception" is also the feat-bonus axis (Alertness / Sharp-Eyed target
# it); that is a SEPARATE system (FeatSkillBonus) whose contribution is additive
# on top of this proficiency.
id: perception
name: Perception
type: passive
category: skill

default_cap: 30

# Defaulting penalty (skills §2.1): the to-notice penalty an untrained perceiver
# takes, consumed by the perception check (PerceptionBonus). Modest — awareness
# is partly innate (Wisdom) — but training visibly sharpens it.
default_penalty: 2

# Keys off Wisdom — awareness (skills §2/§3; visibility §4.2).
gain_base_chance: 30
gain_failure_multiplier: 0.5
gain_stat: wis
gain_stat_scale: 0.1
