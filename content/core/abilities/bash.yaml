cost: 8
pulse_delay: 3
variance: 0
target_types:
  - enemy
effect:
  id: stunned
  duration: 3
  flags:
    - condition:stunned
  recurring_save:
    axis: fortitude
    dc: 13
apply_save:
  axis: fortitude
  dc: 13
