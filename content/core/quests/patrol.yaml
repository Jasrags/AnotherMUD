# tapestry-core starter quest (quests.md §2). Unqualified ids resolve
# against the pack namespace (tapestry-core) at load.
id: gate-patrol
name: Gate Patrol
classification: side
giver: training-master
abandonable: true
prerequisite:
  min_level: 1
stages:
  - id: report
    description: The training master asks you to check the village gate.
    hint: Head south to the village gate.
    objectives:
      - type: visit
        target: village-gate
        description: Visit the village gate.
  - id: clear
    description: Drive off the troublemaker lurking past the gate.
    hint: A road bandit waits in the meadow south of the gate.
    objectives:
      # Was `village-guard`, but the guard spawns in the safe-room
      # town-square where combat is blocked — making the kill stage
      # uncompletable. Repointed to the bandit in the (non-safe) meadow
      # just south of the gate, which fits "troublemaker lurking past
      # the gate" and is actually fightable.
      - type: kill
        target: bandit
        count: 1
        description: Defeat the road bandit in the meadow.
reward:
  xp: 100
  gold: 25
  items:
    - healing-draught
