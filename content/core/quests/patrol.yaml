# tapestry-core starter quest (quests.md §2). Unqualified ids resolve
# against the pack namespace (tapestry-core) at load.
id: gate-patrol
name: Gate Patrol
classification: side
giver: training-master
# The giver's pitch, shown when a player `talk`s to the training master
# (quests.md §3 discovery).
offer: >-
  "We've had trouble out past the gate. Walk the village gate, then deal
  with whatever's lurking in the meadow — come back and I'll see you
  rewarded."
# Turn-in quest (quests.md §4.3): the objectives complete in the world,
# but the reward is claimed by returning to the training master and
# `talk`ing to them — not auto-granted on the killing blow.
turn_in: true
abandonable: true
prerequisite:
  min_level: 1
stages:
  - id: report
    description: The training master asks you to check the village gate.
    hint: Head south to the village gate.
    objectives:
      - type: visit
        target: village-gate
        description: Visit the village gate.
  - id: clear
    description: Drive off the troublemaker lurking past the gate.
    hint: A road bandit waits in the meadow south of the gate.
    objectives:
      # Was `village-guard`, but the guard spawns in the safe-room
      # town-square where combat is blocked — making the kill stage
      # uncompletable. Repointed to the bandit in the (non-safe) meadow
      # just south of the gate, which fits "troublemaker lurking past
      # the gate" and is actually fightable.
      - type: kill
        target: bandit
        count: 1
        description: Defeat the road bandit in the meadow.
reward:
  xp: 100
  gold: 25
  items:
    - healing-draught
  # Uncommon-tier recipe reward (crafting-and-cooking §7): the training
  # master slips you a favourite trail recipe for your trouble. Reward
  # recipe ids ARE namespace-qualified by the loader, so this is the bare
  # local id.
  recipes:
    - cook-trail-stew
