# Starter smithing recipe (crafting-and-cooking §3) — the first recipe in
# the core pack. It hammers an iron ingot into a short sword at a forge.
#
# Milestone C re-pointed this off the old vendor-bought rusty dagger and onto
# a smelted iron ingot, so the chain is now gather -> smelt -> forge: mine
# ore from a cave vein, smelt it (smelt-iron-ingot, also baseline), then beat
# the ingot into a blade. The ore is gather-only, so the sword bottoms out in
# a gather input (§8 / D2.2); the sword is worth more than the ingot (D2.1).
id: reforge-short-sword
name: reforge a short sword
discipline: smithing
# Low floor — the ceiling (station/skill/ingredients), not the floor, is
# the lever (§1.1).
skill_floor: 1
# Needs a forge: Tier 2 fixed station (§4), now enforced — this is only
# craftable in a room with a Tier-2 smithing station (the Hearthwick Forge).
# At the forge its quality also reaches higher than any field attempt could.
station_tier: 2
# Tool (§5): a smithing-tool (e.g. the iron hammer) weights quality by its
# rarity. Optional — reforging without one still works at the baseline tool
# weight; a finer hammer makes a finer sword.
tool: smithing-tool
time_pulses: 30
# Baseline: granted free when you `learn smithing` (§7). Demonstrates the
# Phase 1 acquire-event end to end; richer common/uncommon recipes (the
# gold-sink tiers) are content for later phases.
acquisition: baseline
inputs:
  - { template: iron-ingot, quantity: 1 }
output:
  template: short-sword
  quantity: 1
