# Baseline cooking recipe (crafting-and-cooking §6) — granted free when you
# `learn cooking`. Turns raw meat into a cooked meal. station_tier 1 (a fire)
# is now enforced: cook at the market kitchen (Tier 2), with a carried cook's
# kit (Tier 1, field), or at a built campfire (Phase 5). The market kitchen
# gives the best quality; a field kit is enough for a cold ration / minor buff.
id: cook-hearty-meal
name: cook a hearty meal
discipline: cooking
skill_floor: 1
station_tier: 1
time_pulses: 15
acquisition: baseline
inputs:
  - { template: raw-meat, quantity: 1 }
output:
  template: cooked-meal
  quantity: 1
