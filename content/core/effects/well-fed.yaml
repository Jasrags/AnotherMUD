# Well-fed — the buff a rare-quality cooked meal grants
# (crafting-and-cooking §6). Reachable once cooking is done at a real
# station (Tier 1+ ceilings, Phases 4-5); at Tier-0 cooking the ceiling
# caps output at uncommon, so this tier waits on stations. Standard
# EffectTemplate, no-stack by id. `refreshable`: re-eating while active
# resets the timer (extends the buff) instead of being ignored — the bonus
# never stacks, but a meal is never wasted. 900 ticks = 90s.
id: well-fed
duration: 900
refreshable: true
modifiers:
  - stat: str
    value: 2
