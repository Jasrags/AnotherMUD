# Well-fed (minor) — the buff an uncommon-quality cooked meal grants
# (crafting-and-cooking §6). A standard EffectTemplate applied through the
# consumable effect pipeline (M14.2), not a bespoke buff. `refreshable`:
# re-eating while active RESETS the timer (extends the buff) instead of
# being ignored — the str bonus never stacks, but the duration refreshes so
# a meal is never wasted. 600 ticks = 60s at the default rate.
id: well-fed-minor
duration: 600
refreshable: true
modifiers:
  - stat: str
    value: 1
