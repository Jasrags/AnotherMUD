# Engine-baseline combat-channel derivation (the channel layer —
# docs/themes/channel-vocabulary.md §7). Reproduces the pre-channel reads
# exactly: attack = the hit_mod stat, defense = the ac stat. A setting pack
# overrides per channel (later-wins), e.g. a d20 mapping might use
# `defense: 10 + mod(dex) + armor`. NOTE: these are COMBAT channels, not
# the chat channels in the sibling channels/ dir.
channels:
  attack: hit_mod
  defense: ac
