id: town-square
area: town
name: Town Square
description: |
  Worn cobblestones spread out beneath your feet, polished smooth by
  generations of foot-traffic. A weathered notice board leans against
  the side of the well at the square's centre. Streets lead off to the
  north and east, and the south road runs out toward open country.
exits:
  north: forge
  east: market
  south: village-gate
items:
  - well
