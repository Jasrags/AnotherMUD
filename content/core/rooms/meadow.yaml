id: meadow
area: wilderness
name: "{g}Long-Grass Meadow{x}"
description: |
  The track loses itself in waist-high grass that hisses in the wind.
  A little way off the path, the embers of an abandoned campfire and a
  scatter of trampled ground mark where someone has been waiting for
  travellers. The village gate lies back to the north.
exits:
  north: village-gate
# Deliberately NOT a safe-room: this is the playtest combat arena, the
# one place a player can actually engage a mob (town-square is tagged
# safe-room, which blocks combat). The bandit spawns here via
# areas/wilderness.yaml spawn_rules.
terrain: outdoors
# A loose item on the ground for get/drop/look testing.
items:
  - bless-potion
