id: town
name: Hearthwick Village
description: |
  A handful of cobblestone streets and timbered houses huddled around a
  central square. Smoke drifts up from a forge somewhere out of sight.
# Reset cadence in ticks; ~30s at the default 100ms tick. Engine
# default applies if omitted (spec mobs-ai-spawning §3.5).
reset_interval: 300
# M15.4: the village shares the temperate climate. Outdoor rooms
# (town-square, village-gate, market) receive weather and time
# ambience; the forge is shielded by its `terrain: indoors`.
weather_zone: temperate
spawn_rules:
  - room: town-square
    mob: village-guard
    count: 1
    tags: [persistent]
  # M11.2: a market merchant runs a shop (sells healing draughts +
  # leather caps). Persistent so it's always present to trade with.
  - room: market
    mob: merchant
    count: 1
    tags: [persistent]
