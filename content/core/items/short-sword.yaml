id: short-sword
name: a short sword
type: item
description: |
  A plain soldier's short sword, its blade nicked from use but honed to a
  keen edge. The leather-wrapped grip is darkened with old sweat, and a
  simple crossguard shows the faint scoring of blows turned aside.
tags: [weapon, metal, bladed]
keywords: [sword, short]
properties:
  slot: wield
  damage: 4
  weight: 3
# Starter weapon stats. Combat reads STR (damage via the §4.5 STR bonus)
# and hit_mod (accuracy) from the wielder's stat block, so these
# modifiers make the sword meaningfully better than fighting unarmed.
# (Weapon damage DICE — the `damage` property above — are not yet wired
# into combat; that lands with the equipment-stat combat work.)
modifiers:
  - stat: str
    value: 4
  - stat: hit_mod
    value: 3
