id: short-sword
name: a short sword
type: item
description: |
  A plain soldier's short sword, its blade nicked from use but honed to a
  keen edge. The leather-wrapped grip is darkened with old sweat, and a
  simple crossguard shows the faint scoring of blows turned aside.
tags: [weapon, metal, bladed]
keywords: [sword, short]
properties:
  slot: wield
  weight: 3
# Weapon damage dice (combat §4.5). The wielder rolls this instead of the
# unarmed default; the rolled value is then scaled by STR. Validated at
# pack load and parsed to a dice expression on the instance.
weapon_damage: "1d6"
# Starter weapon stats. On top of the damage die, combat reads STR
# (damage via the §4.5 STR bonus) and hit_mod (accuracy) from the
# wielder's stat block, so these modifiers make the sword meaningfully
# better than fighting unarmed.
modifiers:
  - stat: str
    value: 4
  - stat: hit_mod
    value: 3
