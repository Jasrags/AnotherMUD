<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AnotherMUD — Web Client</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="app">
      <!-- Connection bar -->
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">AnotherMUD</span>
          <span class="brand-sub">web client · P1</span>
        </div>
        <form class="conn" id="conn-form" autocomplete="off">
          <label class="sr-only" for="conn-url">Server WebSocket URL</label>
          <input
            id="conn-url"
            class="conn-url"
            type="text"
            spellcheck="false"
            value="ws://localhost:4001/mud"
            aria-label="Server WebSocket URL"
          />
          <button id="conn-btn" class="btn btn-primary" type="submit">Connect</button>
          <span id="conn-status" class="conn-status" data-state="offline">
            <span class="dot" aria-hidden="true"></span>
            <span class="conn-label">Offline</span>
          </span>
        </form>
      </header>

      <main class="stage">
        <!-- Terminal -->
        <section class="terminal-wrap" aria-label="Game terminal">
          <div id="terminal" class="terminal" role="log" aria-live="polite" tabindex="0"></div>
          <form class="input-bar" id="input-form" autocomplete="off">
            <span class="prompt-glyph" aria-hidden="true">›</span>
            <input
              id="cmd"
              class="cmd"
              type="text"
              spellcheck="false"
              autocapitalize="off"
              placeholder="Type a command and press Enter…"
              aria-label="Command input"
              disabled
            />
            <button class="btn" id="send-btn" type="submit" disabled>Send</button>
          </form>
        </section>

        <!-- HUD -->
        <aside class="hud" aria-label="Character HUD">
          <!-- Identity -->
          <section class="panel panel-identity" id="p-identity" hidden>
            <div class="ident-name" id="ident-name">—</div>
            <div class="ident-sub" id="ident-sub"></div>
          </section>

          <!-- Vitals -->
          <section class="panel" id="p-vitals" hidden>
            <h2 class="panel-title">Vitals</h2>
            <div class="bars" id="vitals-bars"></div>
            <div class="sustenance" id="vitals-sustenance"></div>
          </section>

          <!-- Combat -->
          <section class="panel panel-combat" id="p-combat" hidden>
            <h2 class="panel-title">Combat</h2>
            <div id="combat-body"></div>
          </section>

          <!-- Room -->
          <section class="panel" id="p-room" hidden>
            <h2 class="panel-title">Location</h2>
            <div class="room-name" id="room-name">—</div>
            <div class="room-meta" id="room-meta"></div>
            <canvas class="minimap" id="minimap" width="220" height="220" aria-label="Local map"></canvas>
            <div class="exits" id="room-exits"></div>
          </section>

          <!-- Inventory -->
          <section class="panel" id="p-inventory" hidden>
            <h2 class="panel-title">Inventory</h2>
            <div class="inv-group inv-worn-group">
              <h3 class="inv-heading">Worn</h3>
              <div class="inv-list" id="inv-worn"></div>
            </div>
            <div class="inv-group">
              <h3 class="inv-heading">Carried</h3>
              <div class="inv-list" id="inv-carried"></div>
            </div>
          </section>

          <!-- Craft form (Char.Recipes, P3 Slice B) -->
          <section class="panel" id="p-recipes" hidden>
            <h2 class="panel-title">Crafting</h2>
            <div class="recipes" id="recipes-list"></div>
          </section>

          <!-- Trade form (Char.Shop, P3 Slice B+) -->
          <section class="panel panel-shop" id="p-shop" hidden>
            <h2 class="panel-title">
              <span id="shop-title">Shop</span>
              <span class="shop-money" id="shop-money"></span>
            </h2>
            <div class="shop-cols">
              <div class="shop-col">
                <h3 class="shop-heading">Buy</h3>
                <div class="shop-list" id="shop-buy"></div>
              </div>
              <div class="shop-col">
                <h3 class="shop-heading">Sell</h3>
                <div class="shop-list" id="shop-sell"></div>
              </div>
            </div>
          </section>

          <!-- Direct-trade form (Char.Trade, P3 Slice B++) -->
          <section class="panel panel-trade" id="p-trade" hidden>
            <h2 class="panel-title">
              <span>Trade</span>
              <span class="trade-partner" id="trade-partner"></span>
            </h2>
            <div class="trade-cols">
              <div class="trade-col" id="trade-mine">
                <h3 class="trade-heading">You <span class="trade-check" id="trade-mine-check"></span></h3>
                <div class="trade-list" id="trade-mine-list"></div>
              </div>
              <div class="trade-col" id="trade-theirs">
                <h3 class="trade-heading"><span id="trade-theirs-name">Partner</span> <span class="trade-check" id="trade-theirs-check"></span></h3>
                <div class="trade-list" id="trade-theirs-list"></div>
              </div>
            </div>
            <div class="trade-actions">
              <button class="trade-btn trade-confirm" type="button" data-cmd="confirm">Confirm</button>
              <button class="trade-btn trade-decline" type="button" data-cmd="decline">Cancel</button>
            </div>
          </section>

          <!-- Quest journal (Char.Quests, P3 Slice C) -->
          <section class="panel panel-quests" id="p-quests" hidden>
            <h2 class="panel-title">
              <span>Journal</span>
              <span class="quests-count" id="quests-count"></span>
            </h2>
            <div class="quests" id="quests-list"></div>
          </section>

          <!-- Effects -->
          <section class="panel" id="p-effects" hidden>
            <h2 class="panel-title">Effects</h2>
            <ul class="effects" id="effects-list"></ul>
          </section>

          <!-- Experience -->
          <section class="panel" id="p-xp" hidden>
            <h2 class="panel-title">Progression</h2>
            <div class="tracks" id="xp-tracks"></div>
          </section>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
